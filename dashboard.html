<style>

@media(max-width:640px){.wrap{padding:14px 10px 70px}.topbar{padding:0 10px;gap:8px}.logo{font-size:18px}.card{padding:14px}}

<script>
/* ===== CONFIG ===== */
var firebaseConfig={apiKey:"AIzaSyDI_Xszfjw9f_O1CsL0VC8F_dNtWGEvmo8",authDomain:"devoluciones-y-garantias.firebaseapp.com",databaseURL:"https://devoluciones-y-garantias-default-rtdb.firebaseio.com",projectId:"devoluciones-y-garantias",storageBucket:"devoluciones-y-garantias.firebasestorage.app",messagingSenderId:"1009454788938",appId:"1:1009454788938:web:aa7dc86d838f0c6d2051b3"};

/* ===== UMBRALES DE TASA (ajustables) ===== */

];

/* ===== UTIL ===== */
function $(id){ return document.getElementById(id); }
function esc(s){ return String(s==null?"":s).replace(/[&<>"]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];}); }
function money(n){ return "$"+(Number(n)||0).toFixed(2); }
function dnum(n){ return (Number(n)||0).toFixed(1); }
function fdate(d){ if(!d) return ""; var x=new Date(d); return isNaN(x)?String(d):x.toLocaleDateString("es-EC",{day:"2-digit",month:"2-digit",year:"numeric"}); }
/* Fecha en formato dd/mm/yyyy (igual que el Google Sheets). Si no se puede parsear, devuelve el texto tal cual. */
function fechaDMY(d){ if(d==null||d==="") return ""; var x=parseFecha(d); if(!x) return String(d); return String(x.getDate()).padStart(2,"0")+"/"+String(x.getMonth()+1).padStart(2,"0")+"/"+x.getFullYear(); }
function hoyStr(d){ var x=parseFecha(d); if(!x) return ""; return x.getFullYear()+"-"+String(x.getMonth()+1).padStart(2,"0")+"-"+String(x.getDate()).padStart(2,"0"); }
function mesStr(d){ var x=parseFecha(d); if(!x) return ""; return x.getFullYear()+"-"+String(x.getMonth()+1).padStart(2,"0"); }
function parseFecha(d){
  if(!d) return null;
  if(d instanceof Date) return isNaN(d)?null:d;
  var s=String(d).trim();
  var m=s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})/);
  if(m){
    var dd=+m[1], mm=+m[2], yy=+m[3]; if(yy<100) yy+=2000;
    if(mm>12&&dd<=12){ var t=dd; dd=mm; mm=t; }
    var x=new Date(yy,mm-1,dd); return isNaN(x)?null:x;
  }
  var x2=new Date(s); return isNaN(x2)?null:x2;
}
/* Días entre dos fechas (devuelve null si falta alguna o el orden es inválido) */
function diasEntre(a,b){ var x=parseFecha(a), y=parseFecha(b); if(!x||!y) return null; var d=(y-x)/86400000; return (isFinite(d)&&d>=0)?d:null; }
/* Fecha de la respuesta de revisión: devolución o garantía, la que exista */
function fechaRevision(t){ return (t.fechas&&(t.fechas.devolucion||t.fechas.garantia))||null; }
function arr(v){ if(Array.isArray(v)) return v; if(v&&typeof v==="object") return Object.keys(v).map(function(k){return v[k];}); return []; }
function sucursalDe(factura){ var m=String(factura||"").match(/(\d{3})/); var cod=m?m[1]:""; return {codigo:cod,nombre:SUCURSALES[cod]||(cod?"Sucursal "+cod:"Sin sucursal")}; }
function llegoQ(i){ if(!i.merc) return 0; return i.merc.cantLlegada!==undefined?i.merc.cantLlegada:(i.merc.llego?i.cantidad:0); }
function clienteTipo(t){ var ruc=String(t.ruc||""); if(ruc.length===13) return "Mayorista"; return "Minorista"; }
function itemsAceptados(t){
  if(t.motivo==="GARANTIAS"){ if(!(t.gar&&t.gar.acepta)) return []; return t.items.filter(function(i){return llegoQ(i)>0;}).map(function(i){ var q=llegoQ(i),f=i.cantidad?q/i.cantidad:0; return Object.assign({},i,{cantNC:q,neto:i.neto*f,iva:i.iva*f,total:i.total*f}); }); }
  return t.items.filter(function(i){return i.dev&&i.dev.acepta&&i.dev.cantAcep>0;}).map(function(i){ var f=i.cantidad?i.dev.cantAcep/i.cantidad:0; return Object.assign({},i,{cantNC:i.dev.cantAcep,neto:i.neto*f,iva:i.iva*f,total:i.total*f}); });
}
function totalAceptado(t){ return itemsAceptados(t).reduce(function(s,i){return s+i.total;},0); }
/* color según umbrales de tasa */
function colorTasa(ta){ return ta>UMBRAL_ALERTA?"var(--rojo)":(ta>UMBRAL_OK?"#C77F00":"var(--ok)"); }

/* ===== FIREBASE ===== */
function initFirebase(){
  try{
    if(typeof firebase==="undefined") throw new Error("SDK no cargó");
    firebase.initializeApp(firebaseConfig);
    fbReady=true;
    var fb=$("chip-fb"); if(fb) fb.textContent="🟢 En línea";
    return true;
  }catch(e){ console.error(e); var fb=$("chip-fb"); if(fb) fb.textContent="🔴 Sin conexión"; return false; }
}
function cargarEstado(){
  if(!fbReady){ $("main").innerHTML='<div class="card"><div class="empty"><div class="big">Sin conexión a Firebase</div>No se pudieron cargar los datos.</div></div>'; return; }
  var prog=$("load-prog"); if(prog) prog.style.width="40%";
  firebase.database().ref("estado").get().then(function(snap){
    var val=snap.val()||{};
    state={tickets:arr(val.tickets),guias:arr(val.guias)};
    if(prog) prog.style.width="100%";
    render();
    cargarVentas().then(function(){ render(); }).catch(function(e){ console.warn("Ventas:",e&&e.message); render(); });
  }).catch(function(e){
    console.error(e);
    $("main").innerHTML='<div class="card"><div class="empty"><div class="big">Error al cargar</div>'+esc(e&&e.message||e)+'</div></div>';
  });
}

/* ===== GRÁFICOS SVG ===== */
function svgBarras(datos,opts){
  opts=opts||{};
  var max=1; datos.forEach(function(d){ if(d.valor>max) max=d.valor; });
  function fmt(v){ return opts.money?money(v):v.toLocaleString("es-EC"); }
  if(datos.length===0) return '<div class="muted" style="padding:10px">Sin datos</div>';
  return '<div style="padding:6px 0">'+datos.map(function(d,i){ var pct=d.valor/max*100; return '<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px"><div style="width:150px;font-size:11px;text-align:right;color:var(--mut);overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="'+esc(d.label)+'">'+esc(d.label)+'</div><div style="flex:1;background:#EEF1F4;border-radius:4px;height:20px"><div style="width:'+pct+'%;background:'+(opts.color||PALETA[i%PALETA.length])+';height:100%;border-radius:4px;min-width:2px"></div></div><div style="width:90px;font-size:11px;font-weight:600;text-align:right">'+fmt(d.valor)+'</div></div>'; }).join("")+'</div>';
}
function svgPastel(datos){
  if(datos.length===0) return '<div class="muted" style="padding:10px">Sin datos</div>';
  var total=0; datos.forEach(function(d){ total+=d.valor; }); if(total<=0) total=1;
  var ang=0, R=70, CX=80, CY=80, slices="";
  datos.forEach(function(d,i){
    var frac=d.valor/total, a0=ang, a1=ang+frac*2*Math.PI; ang=a1;
    var x0=CX+R*Math.cos(a0), y0=CY+R*Math.sin(a0), x1=CX+R*Math.cos(a1), y1=CY+R*Math.sin(a1);
    var large=frac>0.5?1:0;
    if(frac>=0.999){ slices+='<circle cx="'+CX+'" cy="'+CY+'" r="'+R+'" fill="'+PALETA[i%PALETA.length]+'"></circle>'; }
    else slices+='<path d="M'+CX+','+CY+' L'+x0.toFixed(1)+','+y0.toFixed(1)+' A'+R+','+R+' 0 '+large+',1 '+x1.toFixed(1)+','+y1.toFixed(1)+' Z" fill="'+PALETA[i%PALETA.length]+'"></path>';
  });
  var leyenda=datos.map(function(d,i){ return '<div style="display:flex;align-items:center;gap:6px;font-size:11px;margin-bottom:3px"><span style="width:11px;height:11px;background:'+PALETA[i%PALETA.length]+';border-radius:2px;display:inline-block"></span><span style="flex:1">'+esc(d.label)+'</span><b>'+(d.valor/total*100).toFixed(1)+'%</b></div>'; }).join("");
  return '<div style="display:flex;gap:14px;align-items:center;flex-wrap:wrap"><svg width="160" height="160" viewBox="0 0 160 160">'+slices+'</svg><div style="flex:1;min-width:150px">'+leyenda+'</div></div>';
}
function svgLinea(labels,valores){
  if(valores.length===0) return '<div class="muted" style="padding:10px">Sin datos</div>';
  var W=600,H=160,P=30,max=1; valores.forEach(function(v){ if(v>max) max=v; });
  var pts=valores.map(function(v,i){ var x=P+(i/Math.max(1,valores.length-1))*(W-2*P); var y=H-P-(v/max)*(H-2*P); return [x,y]; });
  var linea=pts.map(function(p,i){ return (i?"L":"M")+p[0].toFixed(1)+","+p[1].toFixed(1); }).join(" ");
  var area=linea+" L"+pts[pts.length-1][0].toFixed(1)+","+(H-P)+" L"+pts[0][0].toFixed(1)+","+(H-P)+" Z";
  var dots=pts.map(function(p){ return '<circle cx="'+p[0].toFixed(1)+'" cy="'+p[1].toFixed(1)+'" r="3" fill="#D61F26"></circle>'; }).join("");
  var xl=labels.map(function(l,i){ if(labels.length>12&&i%Math.ceil(labels.length/12)!==0) return ""; var x=P+(i/Math.max(1,labels.length-1))*(W-2*P); return '<text x="'+x.toFixed(1)+'" y="'+(H-8)+'" font-size="9" text-anchor="middle" fill="#5B6877">'+esc(l)+'</text>'; }).join("");
  return '<svg width="100%" viewBox="0 0 '+W+' '+H+'" style="max-width:100%"><path d="'+area+'" fill="rgba(214,31,38,.1)"></path><path d="'+linea+'" fill="none" stroke="#D61F26" stroke-width="2"></path>'+dots+xl+'</svg>';
}

/* ===== CÁLCULO ===== */
function ticketsFiltrados(){
  return state.tickets.filter(function(t){
    if(t.estado==="ELIMINADO") return false;
    var f=hoyStr(t.fechaTicket);
    if(desde&&f<desde) return false;
    if(hasta&&f>hasta) return false;
    if(filtroSucursal&&sucursalDe(t.factura).nombre!==filtroSucursal) return false;
    if(filtroVendedor&&t.vendedor!==filtroVendedor) return false;
    if(filtroMotivo&&t.motivo!==filtroMotivo) return false;
    return true;
  });
}
function setFiltro(tipo,val){
  if(tipo==="sucursal") filtroSucursal=(filtroSucursal===val?"":val);
  if(tipo==="vendedor") filtroVendedor=(filtroVendedor===val?"":val);
  if(tipo==="motivo") filtroMotivo=(filtroMotivo===val?"":val);
  render();
}
function limpiarFiltros(){ filtroSucursal=""; filtroVendedor=""; filtroMotivo=""; render(); }
function datosConMonto(tks){
  return tks.map(function(t){
    var esAceptado=(t.estado==="NC")||(t.fechas&&t.fechas.nc);
    var aceptado=esAceptado?totalAceptado(t):0;
    var totalTicket=t.items.reduce(function(s,i){return s+i.total;},0);
    /* REQ 5: el dashboard suma SOLO lo aceptado (garantías/devoluciones aceptadas → NC). */
    return {t:t,monto:aceptado,aceptado:aceptado,esAceptado:!!esAceptado,totalTicket:totalTicket,suc:sucursalDe(t.factura)};
  });
}
function topN(obj,n){
  var arr2=Object.keys(obj).map(function(k){ return {k:k,v:(typeof obj[k]==="object"?obj[k].monto||obj[k].cant||0:obj[k]),full:obj[k]}; });
  arr2.sort(function(a,b){ return b.v-a.v; });
  return arr2.slice(0,n||10);
}

/* ===== CARGA DE VENTAS (CSV) ===== */
function splitCSVLine(line,sep){
  sep=sep||",";
  var cols=[], cur="", inQ=false;
  for(var i=0;i<line.length;i++){
    var c=line[i];
    if(c==='"'){ if(inQ&&line[i+1]==='"'){ cur+='"'; i++; } else { inQ=!inQ; } }
    else if(c===sep&&!inQ){ cols.push(cur); cur=""; }
    else { cur+=c; }
  }
  cols.push(cur);
  return cols;
}
function numEC(s){
  if(s==null) return 0;
  s=String(s).trim().replace(/[^0-9.,\-]/g,"");
  if(!s) return 0;
  var hasC=s.indexOf(",")>=0, hasP=s.indexOf(".")>=0;
  if(hasC&&hasP){
    if(s.lastIndexOf(",")>s.lastIndexOf(".")){ s=s.replace(/\./g,"").replace(",","."); }
    else { s=s.replace(/,/g,""); }
  }else if(hasC){
    var partes=s.split(",");
    if(partes.length===2&&partes[1].length===3&&partes[0].length<=3){ s=s.replace(",",""); }
    else { s=s.replace(",","."); }
  }
  var n=parseFloat(s);
  return isNaN(n)?0:n;
}
function parsearVentas(text){
  var lines=text.split(/\r?\n/);
  if(lines.length<2) return [];
  var sep=lines[0].indexOf(";")>=0?";":",";
  function norm(k){ return String(k||"").trim().toUpperCase().replace(/\s+/g," "); }
  var H=splitCSVLine(lines[0],sep).map(norm);
  function idxAny(names){ for(var j=0;j<names.length;j++){ var p=H.indexOf(names[j]); if(p>=0) return p; } return -1; }
  var iFact=idxAny(["FACTURA"]), iEmi=idxAny(["EMISION","EMISIÓN","FECHA EMISION","FECHA EMISIÓN"]);
  var iRazon=idxAny(["RAZON SOCIAL","RAZÓN SOCIAL","CLIENTE"]), iRuc=idxAny(["IDENTIFICACION","IDENTIFICACIÓN","RUC"]);
  var iTotDoc=idxAny(["TOTAL DOCUMENTO"]), iNeto=idxAny(["PRECIO TOTAL NETO","NETO"]);
  var iCod=idxAny(["CODIGO PRODUCTO","CÓDIGO PRODUCTO","CODIGO","CÓDIGO"]), iTotProd=idxAny(["TOTAL PRODUCTO"]);
  var iMes=idxAny(["MES"]), iCant=idxAny(["CANTIDAD","CANT","UNIDADES"]);
  columnasCSV={mes:iMes>=0,cantidad:iCant>=0,totalDoc:iTotDoc>=0,neto:iNeto>=0,cliente:iRazon>=0};
  var vistas={}, orden=[];
  totalProdSheet={}; comprasCliente={};
  for(var i=1;i<lines.length;i++){
    if(!lines[i].trim()) continue;
    var c=splitCSVLine(lines[i],sep);
    var fact=String(c[iFact]||"").trim();
    if(!fact) continue;
    var cantLinea=iCant>=0?numEC(c[iCant]):0;
    var netoLinea=iNeto>=0?numEC(c[iNeto]):0;
    var totDocLinea=iTotDoc>=0?numEC(c[iTotDoc]):0;
    if(iTotProd>=0&&iCod>=0){ var cod=String(c[iCod]||"").trim(); totalProdSheet[fact+"|"+cod]=numEC(c[iTotProd]); }
    if(!vistas[fact]){
      vistas[fact]={factura:fact,emision:String(c[iEmi]||"").trim(),razon:String(c[iRazon]||"").trim(),ruc:String(c[iRuc]||"").trim(),totalDoc:0,neto:0,cant:0,mes:(iMes>=0?String(c[iMes]||"").trim():"")};
      orden.push(fact);
    }
    var rec=vistas[fact];
    /* NETO y CANTIDAD: se SUMAN todas las líneas de la factura */
    rec.neto+=netoLinea;
    rec.cant+=cantLinea;
    /* TOTAL DOCUMENTO: es el total del documento (se repite por línea). Tomamos el mayor,
       así ignoramos líneas en blanco/0 y no lo sumamos dos veces. */
    if(totDocLinea>rec.totalDoc) rec.totalDoc=totDocLinea;
    if(!rec.emision&&c[iEmi]) rec.emision=String(c[iEmi]).trim();
    if(!rec.razon&&c[iRazon]) rec.razon=String(c[iRazon]).trim();
  }
  var listaV=orden.map(function(f){ return vistas[f]; });
  /* compras por cliente = suma del TOTAL DOCUMENTO (ya a nivel documento) por razón social */
  listaV.forEach(function(r){ comprasCliente[r.razon]=(comprasCliente[r.razon]||0)+r.totalDoc; });
  return listaV;
}
async function cargarVentas(){
  var cb="&_="+Date.now();
  function conBuster(u){ return u+(u.indexOf("?")>=0?cb:"?"+cb.slice(1)); }
  async function fetchTexto(m,url){
    var u=conBuster(url), opts={cache:"no-store"};
    if(m===0){ var r=await fetch(u,opts); if(!r.ok) throw new Error("HTTP "+r.status); return await r.text(); }
    if(m===1){ var r2=await fetch("https://api.allorigins.win/raw?url="+encodeURIComponent(u),opts); if(!r2.ok) throw new Error("HTTP "+r2.status); return await r2.text(); }
    if(m===2){ var r3=await fetch("https://corsproxy.io/?url="+encodeURIComponent(u),opts); if(!r3.ok) throw new Error("HTTP "+r3.status); return await r3.text(); }
    if(m===3){ var r4=await fetch("https://api.allorigins.win/get?url="+encodeURIComponent(u)+"&_="+Date.now(),opts); if(!r4.ok) throw new Error("HTTP "+r4.status); var j=await r4.json(); return j.contents; }
    return null;
  }
  var csv=null;
  for(var ui=0;ui<CSV_URLS.length&&!csv;ui++){
    for(var mi=0;mi<4&&!csv;mi++){
      try{
        var txt=await fetchTexto(mi,CSV_URLS[ui]);
        if(txt&&txt.length>50&&txt.indexOf(",")>=0&&txt.trim().toLowerCase().indexOf("<html")!==0){ csv=txt; }
      }catch(e){}
    }
  }
  if(!csv) throw new Error("No se pudo cargar la base de ventas");
  ventasBase=parsearVentas(csv);
  ventasCargadas=true;
  return ventasBase;
}
/* Facturas (únicas) dentro del rango de fechas por EMISION */
function facturasEnRango(){
  return ventasBase.filter(function(v){
    var fe=v.emision?hoyStr(v.emision):"";
    if(desde&&fe&&fe<desde) return false;
    if(hasta&&fe&&fe>hasta) return false;
    return true;
  });
}

/* ===== TIEMPOS DE GESTIÓN (días por etapa) ===== */
/* Devuelve {emiTicket, ticketMerc, mercRev, revNC, ciclo} por ticket, null donde falte fecha */
function diasTicket(t){
  var rev=fechaRevision(t);
  return {
    emiTicket: diasEntre(t.emision, t.fechaTicket),
    ticketMerc: diasEntre(t.fechaTicket, t.fechas&&t.fechas.mercaderia),
    mercRev: diasEntre(t.fechas&&t.fechas.mercaderia, rev),
    revNC: diasEntre(rev, t.fechas&&t.fechas.nc),
    ciclo: diasEntre(t.fechaTicket, t.fechas&&t.fechas.nc)
  };
}
function acumProm(acc,key,val){ if(val==null) return; if(!acc[key]) acc[key]={s:0,n:0}; acc[key].s+=val; acc[key].n++; }
function promDe(o){ return (o&&o.n)?o.s/o.n:null; }
function celdaDias(o){ var p=promDe(o); return p==null?'<span class="muted">—</span>':('<b>'+dnum(p)+'</b> <span class="muted">d</span>'); }

/* ===== DESCARGA: FACTURAS DEL RANGO ===== */
function exportarFacturasRango(){
  if(!ventasCargadas){ alert("Las ventas aún no han cargado. Espera un momento."); return; }
  var facts=facturasEnRango().slice().sort(function(a,b){ return (a.emision||"").localeCompare(b.emision||""); });
  if(facts.length===0){ alert("No hay facturas en este rango de fechas."); return; }
  var rows=facts.map(function(v){ return {"MES":v.mes||mesStr(v.emision),"FACTURA":v.factura,"SUCURSAL":sucursalDe(v.factura).nombre,"EMISION":v.emision,"CLIENTE":v.razon,"RUC":v.ruc,"TOTAL DOCUMENTO":+(+v.totalDoc).toFixed(2),"NETO":+(+v.neto).toFixed(2),"CANTIDAD":+(+v.cant).toFixed(2)}; });
  var ws=XLSX.utils.json_to_sheet(rows);
  var n=rows.length;
  /* fila de totales con fórmulas */
  XLSX.utils.sheet_add_aoa(ws,[["TOTALES","","","","","","","",""]],{origin:"A"+(n+2)});
  ws["G"+(n+2)]={t:"n",f:"SUM(G2:G"+(n+1)+")",z:"0.00"};
  ws["H"+(n+2)]={t:"n",f:"SUM(H2:H"+(n+1)+")",z:"0.00"};
  ws["I"+(n+2)]={t:"n",f:"SUM(I2:I"+(n+1)+")",z:"0.00"};
  ws["!cols"]=[{wch:10},{wch:16},{wch:20},{wch:12},{wch:34},{wch:15},{wch:15},{wch:13},{wch:11}];
  var wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,"Facturas del rango");
  var suf=(desde||hasta)?("_"+(desde||"inicio")+"_a_"+(hasta||"hoy")):"";
  XLSX.writeFile(wb,"Facturas_del_rango"+suf+".xlsx");
}

/* ===== EXPORTAR EXCEL (reporte gerencial trazable, con fórmulas) ===== */
function exportarExcel(){
  var tks=ticketsFiltrados();
  var datos=datosConMonto(tks);
  if(datos.length===0){ alert("Sin datos para exportar."); return; }
  var wb=XLSX.utils.book_new();

  /* emisión del Sheet por factura (para que la fecha salga igual que en el Sheet) */
  var emiMap={};
  ventasBase.forEach(function(v){ if(emiMap[v.factura]===undefined) emiMap[v.factura]=v.emision; });
  function emiDe(t){ var e=emiMap[t.factura]; return fechaDMY(e!=null&&e!==""?e:t.emision); }

  /* ===================== HOJA: DATOS FACTURAS ===================== */
  var facts=facturasEnRango();
  var fRows=facts.map(function(v){ return {
    "MES":v.mes||mesStr(v.emision),
    "FACTURA":v.factura,
    "SUCURSAL":sucursalDe(v.factura).nombre,
    "EMISION":fechaDMY(v.emision),
    "CLIENTE":v.razon,
    "RUC":v.ruc,
    "TOTAL DOCUMENTO":+(+v.totalDoc).toFixed(2),
    "NETO":+(+v.neto).toFixed(2),
    "CANTIDAD":+(+v.cant).toFixed(2)
  }; });
  /* A MES,B FACTURA,C SUCURSAL,D EMISION,E CLIENTE,F RUC,G TOTAL DOCUMENTO,H NETO,I CANTIDAD */
  var wsF=XLSX.utils.json_to_sheet(fRows.length?fRows:[{"MES":"","FACTURA":"","SUCURSAL":"","EMISION":"","CLIENTE":"","RUC":"","TOTAL DOCUMENTO":0,"NETO":0,"CANTIDAD":0}]);
  wsF["!cols"]=[{wch:10},{wch:16},{wch:20},{wch:12},{wch:34},{wch:15},{wch:16},{wch:14},{wch:11}];
  XLSX.utils.book_append_sheet(wb,wsF,"Datos Facturas");
  var nF=fRows.length, fEnd=(nF||1)+1, SF="'Datos Facturas'";
  var F_TOTDOC="G", F_NETO="H", F_CANT="I", F_SUC="C", F_CLI="E";

  /* ===================== HOJA: DATOS TICKETS (para tiempos) ===================== */
  var tRows=datos.map(function(d){
    var t=d.t, dd=diasTicket(t), rev=fechaRevision(t);
    var estadoTxt=(t.estado==="NC"&&t.nc&&t.nc.hecha)?"APROBADO (NC hecha)":(t.estado==="NC"?"APROBADO (NC pendiente)":"EN PROCESO");
    return {
      "N° TICKET":t.numero,"VENDEDOR":t.vendedor,"SUCURSAL":d.suc.nombre,"MOTIVO":t.motivo,"ESTADO":estadoTxt,
      "EMISION":emiDe(t),"FECHA TICKET":fechaDMY(t.fechaTicket),
      "FECHA MERCADERIA":t.fechas&&t.fechas.mercaderia?fechaDMY(t.fechas.mercaderia):"",
      "FECHA REVISION":rev?fechaDMY(rev):"","FECHA NC":t.fechas&&t.fechas.nc?fechaDMY(t.fechas.nc):"",
      "DIAS EMI-TICKET":dd.emiTicket==null?null:+dd.emiTicket.toFixed(1),
      "DIAS TICKET-MERC":dd.ticketMerc==null?null:+dd.ticketMerc.toFixed(1),
      "DIAS MERC-REV":dd.mercRev==null?null:+dd.mercRev.toFixed(1),
      "DIAS REV-NC":dd.revNC==null?null:+dd.revNC.toFixed(1),
      "DIAS CICLO":dd.ciclo==null?null:+dd.ciclo.toFixed(1),
      "TOTAL APROBADO":+d.aceptado.toFixed(2),
      "VALOR TICKET":+d.totalTicket.toFixed(2)
    };
  });
  var wsT=XLSX.utils.json_to_sheet(tRows.length?tRows:[{}]);
  wsT["!cols"]=[{wch:12},{wch:18},{wch:18},{wch:14},{wch:20},{wch:12},{wch:12},{wch:14},{wch:14},{wch:12},{wch:13},{wch:14},{wch:13},{wch:11},{wch:11},{wch:14},{wch:14}];
  XLSX.utils.book_append_sheet(wb,wsT,"Datos Tickets");
  var nT=tRows.length, tEnd=(nT||1)+1, ST="'Datos Tickets'";

  /* ===================== HOJA: DATOS DEVOLUCIONES (con fechas de los items) ===================== */
  var dRows=[];
  datos.forEach(function(d){
    var t=d.t, suc=d.suc;
    if(!d.esAceptado) return;
    var its=itemsAceptados(t);
    its.forEach(function(i){
      var totProdReal=totalProdSheet[t.factura+"|"+i.codigo];
      dRows.push({
        "N° TICKET":t.numero,"FACTURA":t.factura,
        "EMISION":emiDe(t),"FECHA TICKET":fechaDMY(t.fechaTicket),
        "FECHA NC":t.fechas&&t.fechas.nc?fechaDMY(t.fechas.nc):"",
        "SUCURSAL":suc.nombre,"VENDEDOR":t.vendedor,"MOTIVO":t.motivo,"CLIENTE":t.razonSocial,
        "COD PRODUCTO":i.codigo,"DESCRIPCION":i.desc,"MARCA":i.sub,
        "CANT DEVUELTA":+(+(i.cantNC||i.cantidad)).toFixed(2),
        "TOTAL DEVUELTO":+(+i.total).toFixed(2),
        "TOTAL PRODUCTO (SHEET)":totProdReal!==undefined?+totProdReal.toFixed(2):""
      });
    });
  });
  /* A N°,B FACTURA,C EMISION,D FECHA TICKET,E FECHA NC,F SUCURSAL,G VENDEDOR,H MOTIVO,I CLIENTE,J COD,K DESC,L MARCA,M CANT DEVUELTA,N TOTAL DEVUELTO,O TOTAL PRODUCTO */
  var wsD=XLSX.utils.json_to_sheet(dRows.length?dRows:[{}]);
  wsD["!cols"]=[{wch:12},{wch:16},{wch:12},{wch:12},{wch:12},{wch:18},{wch:18},{wch:14},{wch:30},{wch:14},{wch:34},{wch:14},{wch:13},{wch:14},{wch:18}];
  XLSX.utils.book_append_sheet(wb,wsD,"Datos Devoluciones");
  var nD=dRows.length, dEnd=(nD||1)+1, SD="'Datos Devoluciones'";
  var D_SUC="F", D_VEN="G", D_MOT="H", D_CLI="I", D_COD="J", D_CANT="M", D_TOT="N";

  /* ===================== HOJA ÚNICA: RESUMEN (todo junto, con fórmulas) ===================== */
  var A=[], merges=[], post=[];
  function R(a){ A.push(a||[]); return A.length-1; }   /* fila 0-based */
  function f1(r){ return r+1; }                         /* 0-based -> 1-based */
  function setF(r,c,f,z){ post.push({r:r,c:c,f:f,z:z||"0.00"}); }
  function bandera(r,c2){ merges.push({s:{r:r,c:0},e:{r:r,c:c2}}); }

  var rT=R(["REPORTE GERENCIAL DE DEVOLUCIONES — LUBAMAQUI"]); bandera(rT,7);
  var rP=R(["Periodo: "+(desde||"inicio")+" a "+(hasta||"hoy")+"   |   Generado: "+new Date().toLocaleString("es-EC")]); bandera(rP,7);
  var rN=R(["Cada número es una FÓRMULA que suma desde 'Datos Facturas', 'Datos Tickets' y 'Datos Devoluciones'. Todos los % son sobre la venta bruta."]); bandera(rN,7);
  R([]);

  /* ---- KPIs ---- */
  R(["INDICADORES PRINCIPALES"]); bandera(A.length-1,7);
  R(["Concepto","Valor","","Concepto","Valor"]);
  var kVB=R(["Venta bruta (TOTAL DOCUMENTO)","","","Total devuelto",""]);
  var kVN=R(["Venta neta (PRECIO TOTAL NETO)","","","Artículos facturados",""]);
  var kFA=R(["Facturas únicas","","","Artículos devueltos",""]);
  var kNR=R(["Venta neta real (bruta − devuelto)","","","Tasa devolución % (sobre venta bruta)",""]);
  var kRA=R(["Cantidad total ÷ devuelta","","","Tasa unidades % (sobre artíc. facturados)",""]);
  setF(kVB,1,"SUM("+SF+"!"+F_TOTDOC+"2:"+F_TOTDOC+fEnd+")");
  setF(kVN,1,"SUM("+SF+"!"+F_NETO+"2:"+F_NETO+fEnd+")");
  setF(kFA,1,"COUNTA("+SF+"!B2:B"+fEnd+")","0");
  setF(kNR,1,"B"+f1(kVB)+"-E"+f1(kVB));
  setF(kRA,1,"IFERROR(E"+f1(kVN)+"/E"+f1(kFA)+",0)","0.0");
  setF(kVB,4,"SUM("+SD+"!"+D_TOT+"2:"+D_TOT+dEnd+")");
  setF(kVN,4,"SUM("+SF+"!"+F_CANT+"2:"+F_CANT+fEnd+")");
  setF(kFA,4,"SUM("+SD+"!"+D_CANT+"2:"+D_CANT+dEnd+")");
  setF(kNR,4,"IFERROR(E"+f1(kVB)+"/B"+f1(kVB)+"*100,0)");
  setF(kRA,4,"IFERROR(E"+f1(kFA)+"/E"+f1(kVN)+"*100,0)");
  var VB="$B$"+f1(kVB);  /* referencia a venta bruta para los % */
  R([]);

  /* ---- Por sucursal: total ventas vs total devuelto ---- */
  R(["DEVOLUCIONES POR SUCURSAL — total ventas vs total devuelto"]); bandera(A.length-1,3);
  R(["Sucursal","Total ventas","Total devuelto","% sobre ventas"]);
  var sucKeys=Object.keys((function(){var o={};facts.forEach(function(v){o[sucursalDe(v.factura).nombre]=1;});datos.forEach(function(d){o[d.suc.nombre]=1;});return o;})());
  var sucStart=A.length;
  sucKeys.forEach(function(k){ R([k,"","",""]); });
  var sucEnd=A.length-1;
  for(var rs=sucStart;rs<=sucEnd;rs++){ var fs=f1(rs);
    setF(rs,1,"SUMIF("+SF+"!"+F_SUC+"2:"+F_SUC+fEnd+",A"+fs+","+SF+"!"+F_TOTDOC+"2:"+F_TOTDOC+fEnd+")");
    setF(rs,2,"SUMIF("+SD+"!"+D_SUC+"2:"+D_SUC+dEnd+",A"+fs+","+SD+"!"+D_TOT+"2:"+D_TOT+dEnd+")");
    setF(rs,3,"IFERROR(MIN(C"+fs+"/B"+fs+"*100,100),0)");
  }
  var rSucTot=R(["TOTAL","","",""]);
  setF(rSucTot,1,"SUM(B"+f1(sucStart)+":B"+f1(sucEnd)+")");
  setF(rSucTot,2,"SUM(C"+f1(sucStart)+":C"+f1(sucEnd)+")");
  setF(rSucTot,3,"IFERROR(C"+f1(rSucTot)+"/B"+f1(rSucTot)+"*100,0)");
  R([]);

  /* ---- Por vendedor (devuelto + % s/venta bruta + tiempos) ---- */
  R(["DEVOLUCIONES Y TIEMPOS POR VENDEDOR (días promedio)"]); bandera(A.length-1,7);
  R(["Vendedor","Devuelto","% s/venta bruta","Emi→Tkt (d)","Tkt→Merc (d)","Merc→Rev (d)","Rev→NC (d)","Ciclo (d)"]);
  var venKeys=Object.keys((function(){var o={};datos.forEach(function(d){o[d.t.vendedor]=1;});return o;})());
  var venStart=A.length;
  venKeys.forEach(function(k){ R([k,"","","","","","",""]); });
  var venEnd=A.length-1;
  for(var rv=venStart;rv<=venEnd;rv++){ var fv=f1(rv);
    setF(rv,1,"SUMIF("+SD+"!"+D_VEN+"2:"+D_VEN+dEnd+",A"+fv+","+SD+"!"+D_TOT+"2:"+D_TOT+dEnd+")");
    setF(rv,2,"IFERROR(B"+fv+"/"+VB+"*100,0)");
    setF(rv,3,"IFERROR(AVERAGEIFS("+ST+"!K2:K"+tEnd+","+ST+"!B2:B"+tEnd+",A"+fv+"),\"\")","0.0");
    setF(rv,4,"IFERROR(AVERAGEIFS("+ST+"!L2:L"+tEnd+","+ST+"!B2:B"+tEnd+",A"+fv+"),\"\")","0.0");
    setF(rv,5,"IFERROR(AVERAGEIFS("+ST+"!M2:M"+tEnd+","+ST+"!B2:B"+tEnd+",A"+fv+"),\"\")","0.0");
    setF(rv,6,"IFERROR(AVERAGEIFS("+ST+"!N2:N"+tEnd+","+ST+"!B2:B"+tEnd+",A"+fv+"),\"\")","0.0");
    setF(rv,7,"IFERROR(AVERAGEIFS("+ST+"!O2:O"+tEnd+","+ST+"!B2:B"+tEnd+",A"+fv+"),\"\")","0.0");
  }
  var rVenTot=R(["TOTAL","","","","","","",""]);
  setF(rVenTot,1,"SUM(B"+f1(venStart)+":B"+f1(venEnd)+")");
  setF(rVenTot,2,"IFERROR(B"+f1(rVenTot)+"/"+VB+"*100,0)");
  setF(rVenTot,3,"IFERROR(AVERAGE("+ST+"!K2:K"+tEnd+"),\"\")","0.0");
  setF(rVenTot,4,"IFERROR(AVERAGE("+ST+"!L2:L"+tEnd+"),\"\")","0.0");
  setF(rVenTot,5,"IFERROR(AVERAGE("+ST+"!M2:M"+tEnd+"),\"\")","0.0");
  setF(rVenTot,6,"IFERROR(AVERAGE("+ST+"!N2:N"+tEnd+"),\"\")","0.0");
  setF(rVenTot,7,"IFERROR(AVERAGE("+ST+"!O2:O"+tEnd+"),\"\")","0.0");
  R([]);

  /* ---- Por motivo ---- */
  R(["DEVOLUCIONES POR MOTIVO"]); bandera(A.length-1,2);
  R(["Motivo","Devuelto","% s/venta bruta"]);
  var motKeys=Object.keys((function(){var o={};datos.forEach(function(d){o[d.t.motivo]=1;});return o;})());
  var motStart=A.length;
  motKeys.forEach(function(k){ R([k,"",""]); });
  var motEnd=A.length-1;
  for(var rm=motStart;rm<=motEnd;rm++){ var fm=f1(rm);
    setF(rm,1,"SUMIF("+SD+"!"+D_MOT+"2:"+D_MOT+dEnd+",A"+fm+","+SD+"!"+D_TOT+"2:"+D_TOT+dEnd+")");
    setF(rm,2,"IFERROR(B"+fm+"/"+VB+"*100,0)");
  }
  var rMotTot=R(["TOTAL","",""]);
  setF(rMotTot,1,"SUM(B"+f1(motStart)+":B"+f1(motEnd)+")");
  setF(rMotTot,2,"IFERROR(B"+f1(rMotTot)+"/"+VB+"*100,0)");
  R([]);

  /* ---- Top / Bottom clientes ---- */
  function cliF(r){ var fc=f1(r);
    setF(r,1,"SUMIF("+SF+"!"+F_CLI+"2:"+F_CLI+fEnd+",A"+fc+","+SF+"!"+F_TOTDOC+"2:"+F_TOTDOC+fEnd+")");
    setF(r,2,"SUMIF("+SD+"!"+D_CLI+"2:"+D_CLI+dEnd+",A"+fc+","+SD+"!"+D_TOT+"2:"+D_TOT+dEnd+")");
    setF(r,3,"IF(B"+fc+"=0,\"\",MIN(C"+fc+"/B"+fc+"*100,100))");
  }
  R(["TOP 10 Y 10 DE ABAJO — CLIENTES (compras vs devoluciones)"]); bandera(A.length-1,3);
  R(["Cliente","Compras","Devuelto","% devuelto (s/compras)"]);
  var cliAgg={}; dRows.forEach(function(r){ cliAgg[r.CLIENTE]=(cliAgg[r.CLIENTE]||0)+r["TOTAL DEVUELTO"]; });
  var cliOrd=Object.keys(cliAgg).sort(function(a,b){return cliAgg[b]-cliAgg[a];});
  var cliTop=cliOrd.slice(0,10), cliBot=cliOrd.slice(-10).filter(function(k){return cliTop.indexOf(k)<0;});
  R(["— TOP 10 que más devuelven —"]);
  cliTop.forEach(function(k){ cliF(R([k,"","",""])); });
  if(cliBot.length){ R(["— 10 que menos devuelven —"]); cliBot.forEach(function(k){ cliF(R([k,"","",""])); }); }
  R([]);

  /* ---- Top / Bottom productos ---- */
  function prodF(r){ var fp=f1(r);
    setF(r,2,"SUMIF("+SD+"!"+D_COD+"2:"+D_COD+dEnd+",A"+fp+","+SD+"!"+D_CANT+"2:"+D_CANT+dEnd+")");
    setF(r,3,"SUMIF("+SD+"!"+D_COD+"2:"+D_COD+dEnd+",A"+fp+","+SD+"!"+D_TOT+"2:"+D_TOT+dEnd+")");
    setF(r,4,"IFERROR(D"+fp+"/"+VB+"*100,0)");
  }
  R(["TOP 10 Y 10 DE ABAJO — PRODUCTOS MÁS DEVUELTOS"]); bandera(A.length-1,4);
  R(["Código","Descripción","Cant. devuelta","Monto devuelto","% s/venta bruta"]);
  var prodAgg={},prodDesc={}; dRows.forEach(function(r){ var k=r["COD PRODUCTO"]; prodAgg[k]=(prodAgg[k]||0)+r["CANT DEVUELTA"]; if(!prodDesc[k])prodDesc[k]=r.DESCRIPCION; });
  var prodOrd=Object.keys(prodAgg).sort(function(a,b){return prodAgg[b]-prodAgg[a];});
  var prodTop=prodOrd.slice(0,10), prodBot=prodOrd.slice(-10).filter(function(k){return prodTop.indexOf(k)<0;});
  R(["— TOP 10 más devueltos —"]);
  prodTop.forEach(function(k){ prodF(R([k,prodDesc[k]||"","","",""])); });
  if(prodBot.length){ R(["— 10 menos devueltos —"]); prodBot.forEach(function(k){ prodF(R([k,prodDesc[k]||"","","",""])); }); }

  var wsR=XLSX.utils.aoa_to_sheet(A);
  wsR["!merges"]=merges;
  wsR["!cols"]=[{wch:34},{wch:16},{wch:16},{wch:16},{wch:14},{wch:14},{wch:12},{wch:11}];
  post.forEach(function(p){ wsR[XLSX.utils.encode_cell({r:p.r,c:p.c})]={t:"n",f:p.f,z:p.z}; });
  XLSX.utils.book_append_sheet(wb,wsR,"Resumen");

  /* ===================== HOJA: CÓMO GRAFICAR ===================== */
  var guia=[
    ["CÓMO CREAR GRÁFICOS Y TABLAS DINÁMICAS CON ESTE ARCHIVO"],
    [""],
    ["Las librerías que corren dentro del navegador (sin servidor) no pueden INSERTAR gráficos ni tablas"],
    ["dinámicas nativas dentro del .xlsx. Por eso este reporte trae los DATOS limpios y el RESUMEN ya"],
    ["calculado con fórmulas, todo enlazado, listo para graficar en 2 clics:"],
    [""],
    ["GRÁFICO DESDE LA HOJA 'Resumen':"],
    ["  1. Selecciona la tabla de la sección que quieras (ej. 'Por sucursal' o 'Por vendedor')."],
    ["  2. Insertar -> Grafico -> Columnas agrupadas (o Lineas)."],
    [""],
    ["TABLA DINAMICA (PivotTable) desde los datos crudos:"],
    ["  1. Ve a 'Datos Devoluciones' o 'Datos Facturas'."],
    ["  2. Ctrl+A -> Insertar -> Tabla dinamica."],
    ["  3. Ejemplo: Filas = VENDEDOR, Valores = TOTAL DEVUELTO (Suma)."],
    ["  4. Con la tabla dinamica seleccionada: Insertar -> Grafico dinamico."],
    [""],
    ["TODO ESTA ENLAZADO: si cambias un dato en las hojas 'Datos ...', el Resumen se recalcula solo."]
  ];
  var wsG=XLSX.utils.aoa_to_sheet(guia);
  wsG["!cols"]=[{wch:95}];
  XLSX.utils.book_append_sheet(wb,wsG,"Cómo graficar");

  /* ===================== HOJA: DIAGNÓSTICO ===================== */
  var ventaBruta=0, totalDevuelto=0, devAprobado=0, devProceso=0, vSucX={}, sucD={}, venD={}, motD={}, prodCx={}, cliInfo={};
  facts.forEach(function(v){ ventaBruta+=v.totalDoc; var sn=sucursalDe(v.factura).nombre; vSucX[sn]=(vSucX[sn]||0)+v.totalDoc; });
  datos.forEach(function(d){ var t=d.t; if(d.esAceptado){ totalDevuelto+=d.aceptado; devAprobado+=d.aceptado; sucD[d.suc.nombre]=(sucD[d.suc.nombre]||0)+d.aceptado; venD[t.vendedor]=(venD[t.vendedor]||0)+d.aceptado; motD[t.motivo]=(motD[t.motivo]||0)+d.aceptado; if(!cliInfo[t.razonSocial]) cliInfo[t.razonSocial]={monto:0}; cliInfo[t.razonSocial].monto+=d.aceptado; itemsAceptados(t).forEach(function(i){ if(!prodCx[i.codigo]) prodCx[i.codigo]={cant:0,monto:0,desc:i.desc}; prodCx[i.codigo].cant+=(i.cantNC||0); prodCx[i.codigo].monto+=i.total; }); } else { devProceso+=d.totalTicket; } });
  var tasaG=ventaBruta>0?(totalDevuelto/ventaBruta*100):0;
  var diag=[];
  function dg(p,a,hh,r){ diag.push({"PRIORIDAD":p,"ÁREA":a,"HALLAZGO":hh,"RECOMENDACIÓN":r}); }
  if(tasaG>UMBRAL_ALERTA) dg("🔴 ALTA","General","Tasa de devolución global "+tasaG.toFixed(2)+"% (sobre "+UMBRAL_ALERTA+"%)","Revisar urgente proceso de venta y despacho.");
  else if(tasaG>UMBRAL_OK) dg("🟡 MEDIA","General","Tasa de devolución "+tasaG.toFixed(2)+"% (entre "+UMBRAL_OK+"% y "+UMBRAL_ALERTA+"%)","Monitorear semanal. Identificar las 2-3 causas principales.");
  else dg("🟢 OK","General","Tasa de devolución "+tasaG.toFixed(2)+"% (bajo "+UMBRAL_OK+"%)","Nivel saludable. Mantener controles actuales.");
  Object.keys(vSucX).forEach(function(s){ var vb=vSucX[s]||0, dev=sucD[s]||0, ta=vb>0?dev/vb*100:0; if(ta>UMBRAL_ALERTA&&vb>0) dg("🔴 ALTA","Sucursal: "+s,"Tasa "+ta.toFixed(2)+"% (venta "+money(vb)+", devuelto "+money(dev)+")","Auditar esta sucursal."); });
  var venTop=Object.keys(venD).sort(function(a,b){return venD[b]-venD[a];});
  if(venTop.length&&totalDevuelto>0){ var pct=venD[venTop[0]]/totalDevuelto*100; if(pct>25) dg("🟡 MEDIA","Vendedor: "+venTop[0],"Concentra "+pct.toFixed(0)+"% de las devoluciones ("+money(venD[venTop[0]])+")","Revisar con el vendedor."); }
  var prodTopD=Object.keys(prodCx).sort(function(a,b){return prodCx[b].cant-prodCx[a].cant;});
  if(prodTopD.length){ var pp=prodCx[prodTopD[0]]; if(pp.cant>=5) dg("🔴 ALTA","Producto: "+prodTopD[0]+" "+(pp.desc||"").slice(0,30),"El más devuelto: "+pp.cant+" unidades, "+money(pp.monto),"Revisar calidad del lote y catálogo."); }
  var motTopD=Object.keys(motD).sort(function(a,b){return motD[b]-motD[a];});
  if(motTopD.length&&totalDevuelto>0){ var pm2=motD[motTopD[0]]/totalDevuelto*100; dg(pm2>40?"🔴 ALTA":"🟡 MEDIA","Motivo: "+motTopD[0],"Causa #1: "+pm2.toFixed(0)+"% de las devoluciones","Atacar esta causa raíz."); }
  if(devProceso>devAprobado&&devProceso>0) dg("🟡 MEDIA","Operación","Más monto EN PROCESO ("+money(devProceso)+") que aprobado ("+money(devAprobado)+")","Agilizar revisión de tickets.");
  var pc=promDe((function(){var o={s:0,n:0};datos.forEach(function(d){var dd=diasTicket(d.t);if(dd.ciclo!=null){o.s+=dd.ciclo;o.n++;}});return o;})());
  if(pc!=null&&pc>15) dg(pc>30?"🔴 ALTA":"🟡 MEDIA","Tiempos de gestión","Ciclo promedio ticket→NC: "+dnum(pc)+" días","Agilizar las etapas más lentas (sección 'Por vendedor' en la hoja Resumen).");
  if(diag.length===0) dg("🟢 OK","General","Sin alertas críticas en el periodo","Operación saludable.");
  var ws3=XLSX.utils.json_to_sheet(diag);
  ws3["!cols"]=[{wch:12},{wch:28},{wch:55},{wch:55}];
  XLSX.utils.book_append_sheet(wb,ws3,"Diagnóstico y mejoras");

  var suf=(desde||hasta)?("_"+(desde||"inicio")+"_a_"+(hasta||"hoy")):"";
  XLSX.writeFile(wb,"Reporte_Gerencial_Devoluciones"+suf+".xlsx");
}

/* ===== INIT ===== */
window.addEventListener("error",function(ev){ try{ var m=$("load-msg"); if(m) m.textContent="Error: "+(ev.message||"desconocido"); }catch(e){} });
function arrancar(){
  var intentos=0;
  function probar(){
    intentos++;
    if(typeof firebase!=="undefined"){
      if(initFirebase()) cargarEstado();
      else $("main").innerHTML='<div class="card"><div class="empty"><div class="big">Sin conexión a Firebase</div>No se pudo inicializar. Recarga la página.</div></div>';
      return;
    }
    if(intentos>20){
      $("main").innerHTML='<div class="card"><div class="empty"><div class="big">No se cargó Firebase</div>Verifica tu conexión a internet y recarga la página.</div></div>';
      return;
    }
    var m=$("load-msg"); if(m) m.textContent="Cargando librerías… ("+intentos+")";
    setTimeout(probar,400);
  }
  probar();
}
if(document.readyState==="loading"){ document.addEventListener("DOMContentLoaded",arrancar); }
else { arrancar(); }
</script>
</body>
