<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LUBAMAQUI · Devoluciones y Garantías</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--navy:#0E2A47;--navy2:#143A60;--amber:#D61F26;--bg:#EDF0F3;--card:#FFFFFF;--ink:#1B2430;--mut:#5B6877;--line:#D7DDE4;--ok:#1E7F4F;--ok-bg:#E2F3EA;--bad:#B3261E;--bad-bg:#FBE9E7;--warn-bg:#FFF4D6;--rojo:#D61F26;--negro:#1A1A1A}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--ink);font-size:14px}
h1,h2,h3,.disp{font-family:'Barlow Condensed',sans-serif;letter-spacing:.02em}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit;font-size:14px;padding:8px 10px;border:1px solid var(--line);border-radius:6px;background:#fff;width:100%}
input:focus,select:focus,textarea:focus{outline:2px solid var(--amber);outline-offset:1px;border-color:var(--amber)}
input:disabled{background:#EEF1F4;color:var(--mut)}
label{display:block;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--mut);margin-bottom:4px}
.field{margin-bottom:14px}
.btn{display:inline-flex;align-items:center;gap:6px;border:none;border-radius:6px;padding:9px 16px;font-weight:600;font-size:13px;transition:filter .15s;text-decoration:none}
.btn:hover{filter:brightness(1.08)}
.btn-p{background:var(--navy);color:#fff}
.btn-a{background:var(--amber);color:#fff}
.btn-g{background:#fff;border:1px solid var(--line);color:var(--ink)}
.btn-ok{background:var(--ok);color:#fff}
.btn-bad{background:var(--bad);color:#fff}
.btn-sm{padding:5px 10px;font-size:12px}
.btn:disabled{opacity:.45;cursor:not-allowed}
.card{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:20px;margin-bottom:16px}
.tag{display:inline-block;padding:2px 9px;border-radius:99px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em}
.tag-merc{background:var(--warn-bg);color:#8A6400}
.tag-dev{background:#E3ECF7;color:var(--navy)}
.tag-gar{background:#F0E4F7;color:#6A2E91}
.tag-nc{background:var(--ok-bg);color:var(--ok)}
.tag-fin{background:#E4E7EB;color:var(--mut)}
.tag-bad{background:var(--bad-bg);color:var(--bad)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{font-family:'Barlow Condensed';font-size:13px;letter-spacing:.05em;text-transform:uppercase;text-align:left;color:var(--mut);border-bottom:2px solid var(--navy);padding:8px}
td{padding:8px;border-bottom:1px solid var(--line);vertical-align:top}
.num{text-align:right;font-variant-numeric:tabular-nums}
.topbar{background:var(--navy);color:#fff;padding:0 22px;display:flex;align-items:center;gap:18px;height:58px;position:sticky;top:0;z-index:50;border-bottom:3px solid var(--amber)}
.logo{font-family:'Barlow Condensed';font-weight:700;font-size:24px;letter-spacing:.06em}
.logo span{color:var(--amber)}
.role-chip{background:var(--navy2);border:1px solid rgba(255,255,255,.2);border-radius:6px;padding:4px 12px;font-size:12px}
.wrap{max-width:1200px;margin:0 auto;padding:24px 22px 80px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
@media(max-width:760px){.grid2,.grid3{grid-template-columns:1fr}}
.muted{color:var(--mut);font-size:12px}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:10px 20px;border-radius:8px;z-index:999;font-size:13px;box-shadow:0 6px 20px rgba(0,0,0,.25)}
.modal-bg{position:fixed;inset:0;background:rgba(14,42,71,.55);z-index:100;display:flex;align-items:flex-start;justify-content:center;padding:30px 14px;overflow:auto}
.modal{background:#fff;border-radius:12px;max-width:980px;width:100%;padding:26px}
.itm{border:1px solid var(--line);border-radius:8px;padding:14px;margin-bottom:12px;background:#FAFBFC}
.kv{display:grid;grid-template-columns:170px 1fr;gap:4px 12px;font-size:13px}
.kv b{color:var(--mut);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.05em;padding-top:2px}
.empty{text-align:center;padding:50px 20px;color:var(--mut)}
.empty .big{font-family:'Barlow Condensed';font-size:26px;color:var(--ink);margin-bottom:6px}
#login-view{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(160deg,var(--navy) 0%,#081B30 70%);padding:20px}
.login-card{background:#fff;border-radius:14px;padding:38px 34px;width:400px;border-top:6px solid var(--amber)}
.login-card h1{font-size:34px;color:var(--navy)}
.login-card .sub{color:var(--mut);margin:4px 0 24px;font-size:13px;text-transform:uppercase;letter-spacing:.12em;font-weight:600}
.thumb{width:90px;height:90px;object-fit:cover;border:1px solid var(--line);border-radius:6px}
.tabs{display:flex;gap:6px;margin-bottom:18px;flex-wrap:wrap}
.tab{padding:8px 16px;border-radius:99px;border:1px solid var(--line);background:#fff;font-weight:600;font-size:13px}
.tab.on{background:var(--navy);color:#fff;border-color:var(--navy)}
.alert-del{background:var(--bad-bg);border:1px solid #E8B0AB;border-radius:8px;padding:12px 14px;margin-bottom:12px;font-size:13px}
.ac-wrap{position:relative}
.ac-list{position:absolute;top:100%;left:0;right:0;background:#fff;border:1px solid var(--line);border-radius:0 0 8px 8px;max-height:260px;overflow:auto;z-index:60;box-shadow:0 8px 22px rgba(0,0,0,.14);display:none}
.ac-list div{padding:8px 12px;cursor:pointer;font-size:13px;border-bottom:1px solid #F0F2F5}
.ac-list div:hover{background:#FFE5E5}
.sec-title{font-family:'Barlow Condensed';font-size:17px;color:var(--navy);border-bottom:2px solid var(--line);padding-bottom:4px;margin:16px 0 10px}
.srch-bar{background:#F0F3F7;border:1px solid var(--line);border-radius:8px;padding:10px 14px;margin-bottom:12px;display:flex;align-items:center;gap:10px}
.srch-bar input{border:none;background:transparent;font-size:14px;flex:1;outline:none;min-width:0}
.hl{background:#FFF176;border-radius:2px}
.prog-bar{background:#D7DDE4;border-radius:4px;height:8px;overflow:hidden;margin-top:8px}
.prog-fill{background:var(--amber);height:100%;transition:width .3s}
@media(max-width:640px){.wrap{padding:14px 10px 70px}.topbar{padding:0 10px;gap:8px;height:52px}.logo{font-size:18px}.role-chip{font-size:10px;padding:3px 8px}.modal{padding:16px;border-radius:10px}.modal-bg{padding:12px 6px}.card{padding:14px}table{font-size:12px}td,th{padding:6px 5px}.btn{padding:8px 12px}h2{font-size:22px!important}input,select,textarea{font-size:16px}}
@media print{body *{visibility:hidden}#ticket-print,#ticket-print *{visibility:visible}#ticket-print{position:fixed;left:0;top:0;width:80mm}}
#ticket-print{font-family:"Courier New",monospace;font-size:10pt;width:74mm;display:none}
</style>
</head>
<body>
<div id="ticket-print"></div>

<div id="login-view">
  <div class="login-card">
    <img src="logo.png" alt="LUBAMAQUI" style="width:180px;display:block;margin:0 auto 8px" onerror="this.style.display='none';var t=document.getElementById('login-txt-logo');if(t)t.style.display='block'">
    <h1 id="login-txt-logo" style="display:none">LUBA<span style="color:var(--rojo)">MAQUI</span></h1>
    <div class="sub">Devoluciones · Garantías · Notas de crédito</div>
    <div class="field"><label>Usuario</label><select id="login-user"></select></div>
    <div class="field"><label>Contraseña</label><input id="login-pass" type="password" placeholder="••••" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <div id="login-err" style="color:var(--bad);font-size:13px;margin-bottom:10px;display:none">Contraseña incorrecta.</div>
    <button class="btn btn-a" style="width:100%;justify-content:center;font-size:15px;padding:12px" onclick="doLogin()">Entrar</button>
  </div>
</div>

<div id="app-view" style="display:none">
  <div class="topbar">
    <img src="logo.png" alt="LUBAMAQUI" style="height:38px" onerror="this.style.display='none';var t=document.getElementById('top-txt-logo');if(t)t.style.display='block'">
    <div class="logo" id="top-txt-logo" style="display:none">LUBA<span>MAQUI</span></div>
    <div class="role-chip" id="chip-role"></div>
    <div style="flex:1"></div>
    <div style="font-size:12px;color:rgba(255,255,255,.75)" id="chip-fb"></div>
    <div style="font-size:12px;color:rgba(255,255,255,.75)" id="chip-base"></div>
    <div style="font-size:13px" id="chip-user"></div>
    <button class="btn btn-sm" style="background:rgba(255,255,255,.12);color:#fff" onclick="logout()">Salir</button>
  </div>
  <div class="wrap" id="main"></div>
</div>

<div id="modal-root"></div>

var fbApp=null, fbDB=null, fbReady=false, fbSuscrito=false;
function initFirebaseApp(){
  if(typeof firebase==="undefined") throw new Error("SDK no cargó");
  if(!fbApp){ fbApp=firebase.initializeApp(firebaseConfig); fbDB=firebase.database(); }
}
/* Login real contra Firebase Authentication: sin sesión válida, las reglas de la base
   niegan lectura y escritura. Devuelve true/false; no lanza errores hacia arriba. */
async function iniciarSesionFirebase(nombre,pin){
  try{
    initFirebaseApp();
    await firebase.auth().signInWithEmailAndPassword(emailAuthDe(nombre),AUTH_PASS_PREFIJO+pin);
    fbReady=true;
    return true;
  }catch(e){ console.error(e); fbReady=false; return false; }
}

      state={seq3200:val.seq3200||0,seq5200:val.seq5200||0,seq2200:val.seq2200||0,tickets:arr(val.tickets),guias:arr(val.guias),avisos:arr(val.avisos),sobres:arr(val.sobres)};
    }else{
      state={seq3200:0,seq5200:0,seq2200:0,tickets:[],guias:[],avisos:[],sobres:[]};
    }
    if(primera){ primera=false; if(onPrimera) onPrimera(); }
    else if(me){ render(); }

   Ahora el número se pide con una transacción atómica en Firebase (contadores/seqXXXX),
   así Firebase garantiza que cada ticket reciba un número único aunque varios guarden

function maxNumeroSerie(prefijo){
  var mx=0;
  (state.tickets||[]).forEach(function(t){
    var m=String(t.numero||"").match(/^(\d{4})-(\d+)/);
    if(m&&m[1]===prefijo){ var n=+m[2]; if(n>mx) mx=n; }
  });

}
async function siguienteNumero(prefijo){
  var seedLocal=(prefijo==="5200"?state.seq5200:(prefijo==="3200"?state.seq3200:state.seq2200))||0;
  var seed=Math.max(seedLocal,maxNumeroSerie(prefijo));
  var n;
  if(fbReady){
    var res=await fbDB.ref("contadores/seq"+prefijo).transaction(function(cur){ return (cur==null?seed:cur)+1; });
    n=res.snapshot.val();
  }else{
    n=seed+1;
  }
  if(prefijo==="5200") state.seq5200=n; else if(prefijo==="3200") state.seq3200=n; else state.seq2200=n;
  return prefijo+"-"+String(n).padStart(4,"0");
}

/* Conversor numérico robusto: entiende "1,0000" (coma decimal, formato latino) y también "1.0000" */
function numEC(s){
  if(s==null) return 0;
  s=String(s).trim().replace(/[^0-9.,\-]/g,"");
  if(!s) return 0;
  var hasC=s.indexOf(",")>=0, hasP=s.indexOf(".")>=0;
  if(hasC&&hasP){
    if(s.lastIndexOf(",")>s.lastIndexOf(".")){ s=s.replace(/\./g,"").replace(",","."); }
    else { s=s.replace(/,/g,""); }
  }else if(hasC){
    var partes=s.split(",");
    if(partes.length===2&&partes[1].length===3&&partes[0].length<=3){ s=s.replace(",",""); }
    else { s=s.replace(",","."); }
  }
  var n=parseFloat(s);
  return isNaN(n)?0:n;
}
function parsearCSV(text){
  var rows=[], ncList=[], lines=text.split(/\r?\n/);
  if(lines.length<2) return [];
  var sep=lines[0].indexOf(";")>=0?";":",";
  function norm(k){ return String(k||"").trim().toUpperCase().replace(/\s+/g," "); }
  var headers=splitCSVLine(lines[0],sep).map(norm);
  function idx(h){ return headers.indexOf(h); }
  var iEmi=idx("EMISION"),iFact=idx("FACTURA"),iRuc=idx("IDENTIFICACION"),iRazon=idx("RAZON SOCIAL"),iCod=idx("CODIGO PRODUCTO"),iDesc=idx("DESCRIPCION PRODUCTO"),iSub=idx("SUBGRUPO"),iCant=idx("CANTIDAD"),iNeto=idx("PRECIO TOTAL NETO"),iIva=idx("IVA TOTAL"),iTot=idx("TOTAL PRODUCTO"),iF2=idx("FACTURADOR"),iFacNC=idx("FAC DE LA NC");
  for(var i=1;i<lines.length;i++){
    if(!lines[i].trim()) continue;
    var c=splitCSVLine(lines[i],sep);
    var fact=String(c[iFact]||"").trim(), razon=String(c[iRazon]||"").trim();
    if(!fact||!razon) continue;
    var codigo=String(c[iCod]||"").trim();
    var cant=numEC(c[iCant]), neto=numEC(c[iNeto]), iva=numEC(c[iIva]), tot=numEC(c[iTot]);
    var facNCraw=iFacNC>=0?String(c[iFacNC]||"").trim():"";
    var esNC=!!(facNCraw&&facNCraw.toUpperCase()!=="FALSO"&&facNCraw.toUpperCase()!=="FALSE");
    if(esNC){
      /* Esta fila es una NOTA DE CRÉDITO (no un producto vendible): se concilia contra
         su factura ORIGINAL (FAC DE LA NC) más abajo, y esta línea no entra a la base. */
      ncList.push({facOrigen:facNCraw,codigo:codigo,cant:cant,neto:neto,iva:iva,total:tot});
      continue;
    }
    rows.push({emision:String(c[iEmi]||"").trim(),factura:fact,ruc:String(c[iRuc]||"").trim(),razon:razon,codigo:codigo,desc:String(c[iDesc]||"").trim(),sub:String(c[iSub]||"").trim(),facturador:String(c[iF2]||"").trim(),cant:cant,neto:neto,iva:iva,total:tot,creditoAplicado:0});
  }
  conciliarCreditosNC(rows,ncList);
  ncFilasCrudas=ncList.length;   /* NC crudas: se restan de sus facturas pero SÍ cuentan como líneas de la base */
  return rows;
}
/* ===== CONCILIACIÓN DE NOTAS DE CRÉDITO (mismo razonamiento que el script de reconciliación) =====
   1. Cada NC se agrupa por (factura ORIGINAL, código).
   2. Se busca esa combinación en las filas normales (vendibles) y se le RESTA el crédito
      (cantidad, neto, iva, total) directamente — quedan ya conciliadas, no hay que recalcular
      esto en cada pantalla.
   3. Si el mismo factura+código aparece en varias líneas duplicadas, el crédito se reparte
      proporcional a la cantidad de cada línea (para no dejar una sola en negativo por error).
   4. Si una NC no encuentra su factura original en esta misma base (factura de un periodo
      anterior que no vino en este extracto), se cuenta aparte y no afecta nada.
   5. Si después de conciliar alguna línea queda con cantidad negativa, es un caso real de
      sobre-crédito en contabilidad (no un bug) y se deja registrado para revisión manual. */
function conciliarCreditosNC(rows,ncList){
  ncAplicados=0; ncSinMatch=0; ncFilasNegativas=0; ncSinMatchList=[]; ncNegativasList=[];
  var creditos={};
  ncList.forEach(function(n){
    var k=n.facOrigen+"|"+n.codigo;
    if(!creditos[k]) creditos[k]={cant:0,neto:0,iva:0,total:0};
    creditos[k].cant+=n.cant; creditos[k].neto+=n.neto; creditos[k].iva+=n.iva; creditos[k].total+=n.total;
  });
  var indice={};
  rows.forEach(function(r,i){ var k=r.factura+"|"+r.codigo; (indice[k]=indice[k]||[]).push(i); });
  Object.keys(creditos).forEach(function(k){
    var valores=creditos[k], idxs=indice[k];
    if(!idxs||!idxs.length){
      ncSinMatch++;
      var p=k.split("|"); ncSinMatchList.push({facOrigen:p[0],codigo:p[1],cant:valores.cant,total:valores.total});
      return;
    }
    if(idxs.length===1){
      var r=rows[idxs[0]];
      r.cant+=valores.cant; r.neto+=valores.neto; r.iva+=valores.iva; r.total+=valores.total;
      r.creditoAplicado+=Math.abs(valores.cant);
    }else{
      /* líneas duplicadas con el mismo factura+código: repartir proporcional a la cantidad */
      var totalCant=0; idxs.forEach(function(i){ totalCant+=rows[i].cant; });
      idxs.forEach(function(i){
        var r=rows[i];
        var peso=totalCant?(r.cant/totalCant):(1/idxs.length);
        r.cant+=valores.cant*peso; r.neto+=valores.neto*peso; r.iva+=valores.iva*peso; r.total+=valores.total*peso;
        r.creditoAplicado+=Math.abs(valores.cant*peso);
      });
    }
    ncAplicados++;
  });
  rows.forEach(function(r){
    if(r.cant<-0.0001){ ncFilasNegativas++; ncNegativasList.push({factura:r.factura,codigo:r.codigo,desc:r.desc,cant:r.cant,total:r.total}); }
  });
}
function splitCSVLine(line,sep){

    if(c==='"'){ if(inQ&&line[i+1]==='"'){ cur+='"'; i++; } else { inQ=!inQ; } }
    else if(c===sep&&!inQ){ cols.push(cur); cur=""; }
    else { cur+=c; }
  }

/* Interpreta fechas tipo "25/01/2026 12:35:54" (DD/MM/AAAA, como las exporta el Sheet) de forma correcta.
   new Date() nativo asume MM/DD/AAAA (formato EEUU) y o bien calcula mal el día/mes, o falla en silencio
   cuando el día es >12 (ej: 25/01/2026 -> mes 25 inválido). Para fechas ISO (las que genera el propio

function parseFechaFlexible(d){
  if(!d) return new Date(NaN);
  var s=String(d).trim();
  var m=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})(?:[ T](\d{1,2}):(\d{2})(?::(\d{2}))?)?$/);
  if(m){

    var hh=m[4]?parseInt(m[4],10):0, mi=m[5]?parseInt(m[5],10):0, ss=m[6]?parseInt(m[6],10):0;

  if(t.estado==="NC") return '<span class="tag tag-nc">'+(t.motivo==="DACION EN PAGOS"?"Dación en pagos (NC)":"Notas de crédito")+(t.nc&&t.nc.hecha?" · NC hecha":" · pendiente")+'</span>';
  if(t.estado==="NO_LLEGO") return '<span class="tag tag-bad">No llegó</span>';

  if(t.estado==="ELIMINADO") return '<span class="tag tag-bad">Eliminado</span>';
  return '<span class="tag tag-fin">'+esc(t.estado)+'</span>';
}

function facturaTieneSaldo(factura){

    var lineas=base.filter(function(x){ return x.factura===factura; });
    if(lineas.length===0) return false;
    var dev=devolucionesPorCodigo(factura);
    return lineas.some(function(r){ return (r.cant-(dev.cant[r.codigo]||0))>0; });

}

      }

function avisoDias30(emision){

function totalLinea(r,q){ q=Math.max(0,Math.min(r.cant,+q||0)); var f=r.cant?q/r.cant:0; return r.total*f; }
function renderItemsBody(){
  var tbody=$("n-tbody"); if(!tbody) return;

  state.tickets.push(t); await saveState();

function fechaRepRef(role,t){

function histFiltrado(role){
  return state.tickets.filter(function(t){
    if(t.estado==="ELIMINADO") return false;

function revisar(role,id){ if(!puedeActuar()){ toast("👁 Modo solo lectura: no puedes revisar tickets fuera de tu propia pestaña.",4000); return; } var t=findT(id); if(role==="MERCADERIA") revisarMerc(t); else if(role==="DEVOLUCION"){ if(t.anioAnterior) revisarValidacionAnio(t); else revisarDev(t); } else revisarGar(t); }

function revisarValidacionAnio(t){
  var esGar=t.motivo==="GARANTIAS";
  var h='<div class="modal-bg"><div class="modal"><h2 style="font-size:24px;color:var(--navy)">Validar total · '+esc(t.numero)+'</h2><div class="muted" style="margin-bottom:12px">'+esc(t.razonSocial)+' · Factura '+esc(t.factura)+' · Año <b>'+esc(t.anioFactura)+'</b> · '+(esGar?"Garantía":"Devolución")+'</div>';
  h+='<div class="card" style="background:#F0F3F7;border-color:#C9D3DD">Revisa y corrige el <b>total</b> que puso el asesor en cada línea. '+(esGar?'Al guardar, el ticket pasa al revisor de <b>Garantías</b> para el informe técnico.':'Indica además si se <b>acepta o se rechaza</b> cada línea (las devoluciones de años anteriores suelen rechazarse por tiempo expirado).')+'</div>';
  h+=t.items.map(function(i,x){
    if(llegoQ(i)<=0) return "";
    var q=llegoQ(i);
    var dec=esGar?'':'<div><label>Decisión</label><select id="va-ac-'+x+'"><option value="">—</option><option value="1">SÍ SE ACEPTA</option><option value="0">NO SE ACEPTA</option></select></div><div><label>Cantidad aceptada</label><input type="number" min="0" max="'+q+'" value="'+q+'" id="va-ca-'+x+'" style="text-align:right"></div>';
    return '<div class="itm"><div style="margin-bottom:8px"><b>'+esc(i.codigo)+'</b> <span class="muted">Cant. que llegó: '+q+' de '+i.cantidad+'</span><div style="font-size:12px">'+esc(i.desc)+'</div>'+(i.comVendedor?'<div class="muted">'+esc(i.comVendedor)+'</div>':'')+'</div><div class="grid3"><div><label>Total $ (validado)</label><input type="number" min="0" step="0.01" value="'+(+i.total).toFixed(2)+'" id="va-tot-'+x+'" style="text-align:right"></div>'+dec+'</div></div>';
  }).join("");
  h+='<div style="display:flex;gap:10px;justify-content:flex-end;margin-top:14px"><button class="btn btn-g" onclick="cerrarModal()">Cancelar</button><button class="btn btn-p" onclick="guardarValidacionAnio(\''+t.id+'\')">'+(esGar?"Validar y enviar a Garantía":"Guardar validación")+'</button></div></div></div>';
  $("modal-root").innerHTML=h;
}
async function guardarValidacionAnio(id){
  if(!puedeActuar()){ toast("👁 Modo solo lectura.",4000); return; }
  var t=findT(id); if(!t) return;
  var esGar=t.motivo==="GARANTIAS";
  var ahora=new Date().toISOString();
  var idxs=[]; t.items.forEach(function(i,x){ if(llegoQ(i)>0) idxs.push(x); });
  idxs.forEach(function(x){ var el=$("va-tot-"+x); var tv=el?(+el.value||0):0; t.items[x].total=+tv.toFixed(2); t.items[x].neto=+tv.toFixed(2); t.items[x].iva=0; });
  t.valorValidado={por:me.name,f:ahora};
  t.fechas=t.fechas||{}; t.fechas.devolucion=ahora;
  if(esGar){
    t.estado="GARANTIA"; t.validacionAnioPendiente=false; t.garPendiente=true; t.devPendiente=false;
    t.historial.push({f:ahora,e:"Total validado por Devoluciones ("+me.name+") → enviado a revisión de garantía"});
    await saveState(); cerrarModal(); toast("✓ Total validado. Ticket "+t.numero+" enviado a Garantías."); render(); return;
  }
  for(var j=0;j<idxs.length;j++){ if($("va-ac-"+idxs[j]).value===""){ toast("Selecciona la decisión en todos los productos."); return; } }
  idxs.forEach(function(x){ var i=t.items[x], max=llegoQ(i); i.dev={acepta:$("va-ac-"+x).value==="1",cantAcep:Math.max(0,Math.min(max,+($("va-ca-"+x).value||0))),com:"",por:me.name,f:ahora}; });
  var alguna=idxs.some(function(x){ return t.items[x].dev.acepta&&t.items[x].dev.cantAcep>0; });
  t.validacionAnioPendiente=false; t.devPendiente=false;
  if(alguna){ t.estado="NC"; t.nc=t.nc||{hecha:false}; t.historial.push({f:ahora,e:"Total validado y devolución aceptada → NC ("+me.name+")"}); }
  else { t.estado="DEV_RECHAZADA"; t.historial.push({f:ahora,e:"Total validado, devolución NO aceptada por tiempo/criterio ("+me.name+")"}); }
  await saveState(); cerrarModal(); toast("✓ Validación guardada."); render();
}

function mercTodo(id,todo){ var t=findT(id); t.items.forEach(function(i,x){ var el=$("m-q-"+x); if(el) el.value=todo?i.cantidad:0; }); }
function routeTrasMerc(t,ahora,prefix){
  var hayDev=false, hayGar=false, hayDacion=false;
  t.items.forEach(function(i){
    if(llegoQ(i)<=0) return;
    var tp=tipoDeItem(t,i);
    if(tp==="GARANTIA") hayGar=true;
    else if(tp==="DACION") hayDacion=true;
    else hayDev=true;
  });
  if(!hayDev&&!hayGar&&!hayDacion){
    t.estado="NO_LLEGO"; t.historial.push({f:ahora,e:prefix+"no llegó mercadería ("+me.name+")"});
    return;
  }
  /* Año anterior: TODO pasa primero por Devoluciones a validar el total escrito por el asesor */
  if(t.anioAnterior){
    t.estado="DEVOLUCION"; t.validacionAnioPendiente=true; t.devPendiente=true; t.garPendiente=false;
    t.historial.push({f:ahora,e:prefix+"año anterior → Devoluciones valida el total ("+me.name+")"});
    return;
  }
  t.devPendiente=hayDev; t.garPendiente=hayGar; t.devSolicitado=hayDev; t.garSolicitado=hayGar;
  if(hayDev&&hayGar){
    t.estado="MIXTO"; t.historial.push({f:ahora,e:prefix+"mixto (devolución + garantía) ("+me.name+")"});
  }else if(hayGar){
    t.estado="GARANTIA"; t.historial.push({f:ahora,e:prefix+"garantía ("+me.name+")"});
  }else if(hayDacion){
    t.estado="DACION_ADMIN"; t.historial.push({f:ahora,e:prefix+"autorización administrativa · dación en pagos ("+me.name+")"});
  }else{
    t.estado="DEVOLUCION"; t.historial.push({f:ahora,e:prefix+"devolución ("+me.name+")"});
  }
}
async function guardarMerc(id){
  if(!puedeActuar()){ toast("👁 Modo solo lectura.",4000); return; }
  var t=findT(id), guiaOk=$("m-guia")?$("m-guia").value:"1";
  if($("m-guia")&&guiaOk===""){ toast("Indica si la guía es correcta."); return; }
  var ahora=new Date().toISOString();
  var soloGuia=!document.getElementById("m-q-0")&&(t.mercRevisada||t.items.some(function(i){return i.merc;}));

  /* ---- REQ 3: solo se valida la corrección de la guía; la mercadería ya revisada se conserva ---- */
  if(soloGuia){
    if(guiaOk==="0"){
      var mot=($("m-guia-com")?$("m-guia-com").value:"").trim()||"Guía incorrecta";
      t.guiaIncorrecta={motivo:mot,por:me.name,f:ahora}; t.guiaId=null; t.estado="GUIA_INCORRECTA";
      t.guiaIncidencias=t.guiaIncidencias||[]; t.guiaIncidencias.push({motivo:mot,por:me.name,f:ahora});
      t.historial.push({f:ahora,e:"Guía nuevamente incorrecta ("+me.name+"). Mercadería revisada conservada. Motivo: "+mot});
      await saveState(); cerrarModal(); toast("Guía incorrecta. La mercadería revisada se conserva."); render(); return;
    }
    t.guiaValidada={por:me.name,f:ahora}; t.guiaModificada=false;
    routeTrasMerc(t,ahora,"Guía corregida validada (mercadería conservada) → ");
    await saveState(); cerrarModal(); toast("✓ Guía validada. No se repitió la revisión de mercadería."); render(); return;
  }

  /* ---- Guía marcada incorrecta en revisión completa ---- */
  if(guiaOk==="0"){
    var motivo=($("m-guia-com")?$("m-guia-com").value:"").trim()||"Guía incorrecta";
    t.fechas=t.fechas||{}; t.fechas.mercaderia=ahora;
    /* Si la mercadería ya fue completada en este formulario, se conserva para no repetirla al corregir la guía */
    var completa=t.items.every(function(i,x){ var el=$("m-q-"+x); return el&&el.value!==""; });
    if(completa){
      t.items.forEach(function(i,x){ var q=Math.max(0,Math.min(i.cantidad,+($("m-q-"+x).value||0))); i.merc={cantLlegada:q,com:$("m-co-"+x).value,por:me.name,f:ahora}; });
      t.mercRevisada=true;
      if(t.sobre){ var sl0=$("m-sobre")?$("m-sobre").value:""; if(sl0!=="") t.sobreLlego=(sl0==="1"); }
    }
    t.guiaIncorrecta={motivo:motivo,por:me.name,f:ahora}; t.guiaId=null; t.estado="GUIA_INCORRECTA";
    t.guiaIncidencias=t.guiaIncidencias||[]; t.guiaIncidencias.push({motivo:motivo,por:me.name,f:ahora});
    t.historial.push({f:ahora,e:"Devuelto por guía incorrecta ("+me.name+")."+(completa?" Mercadería revisada conservada.":"")+" Motivo: "+motivo});
    if(completa) registrarAvisoExtra(t);
    await saveState(); cerrarModal(); toast(completa?"Devuelto por guía. La mercadería revisada se conservó.":"Ticket devuelto. La guía volvió a estar activa."); render(); return;
  }

  /* ---- Revisión de mercadería completa, guía correcta (o ticket sin guía) ---- */
  for(var x=0;x<t.items.length;x++){ if(!$("m-q-"+x)||$("m-q-"+x).value===""){ toast("Digita la cantidad llegada en todos los productos."); return; } }
  if(t.sobre){ var sl=$("m-sobre")?$("m-sobre").value:""; if(sl===""){ toast("Indica si el sobre llegó."); return; } t.sobreLlego=(sl==="1"); }
  t.guiaValidada={por:me.name,f:ahora}; if(t.guiaModificada) t.guiaModificada=false;
  t.items.forEach(function(i,x){ var q=Math.max(0,Math.min(i.cantidad,+($("m-q-"+x).value||0))); i.merc={cantLlegada:q,com:$("m-co-"+x).value,por:me.name,f:ahora}; });
  t.mercRevisada=true;
  t.fechas=t.fechas||{}; t.fechas.mercaderia=ahora;
  routeTrasMerc(t,ahora,"Guía OK → ");
  registrarAvisoExtra(t);
  await saveState(); cerrarModal(); toast("✓ Revisión de mercadería guardada."); render();
}

/* ===== REV DEVOLUCIÓN ===== */
function revisarDev(t){
  var items=t.items.filter(function(i){return llegoQ(i)>0&&tipoDeItem(t,i)==="DEVOLUCION";});
  var h='<div class="modal-bg"><div class="modal"><h2 style="font-size:24px;color:var(--navy)">Revisión de devolución · '+esc(t.numero)+'</h2><div class="muted" style="margin-bottom:14px">'+esc(t.razonSocial)+' · Factura '+esc(t.factura)+'</div>';

async function guardarGar(id){
  if(!puedeActuar()){ toast("👁 Modo solo lectura.",4000); return; }
  var t=findT(id);
  var ahora=new Date().toISOString(), ya=!!t.gar, esMixtoPendiente=(t.estado==="MIXTO");
  t.fechas=t.fechas||{}; if(!ya) t.fechas.garantia=ahora;
  var itemsAcep={}, totalAcep=0, totalRech=0, hayItems=false;
  t.items.forEach(function(i,x){
    if(llegoQ(i)>0&&tipoDeItem(t,i)==="GARANTIA"){
      hayItems=true; var inp=$("g-ca-"+x), max=llegoQ(i);
      var cant=inp?Math.max(0,Math.min(max,+(inp.value||0))):max;
      itemsAcep[x]=cant; totalAcep+=cant; totalRech+=(max-cant);
    }
  });
  if(!hayItems){ toast("No hay ítems de garantía con mercadería recibida."); return; }
  var hayRechazo=totalRech>0;
  var gar={acepta:totalAcep>0,itemsAcep:itemsAcep,hayRechazo:hayRechazo,com:$("g-com").value,por:me.name,f:t.gar?t.gar.f:ahora};
  if(hayRechazo){
    gar.marca=$("g-marca").value; gar.ciudad=$("g-ciudad").value; gar.telefono=$("g-tel").value; gar.email=$("g-email").value;
    gar.cartaCom=$("g-carta").value; gar.parrafo2=$("g-p2").value; gar.antecedentes=$("g-ant").value; gar.revTecnica=$("g-rev").value;
    gar.analisisTec=$("g-analisis").value; gar.conclusiones=$("g-conclu").value; gar.recomendaciones=$("g-recom").value;
    gar.fotos=garFotos; gar.fotos2=garFotos2;
    gar.informe={contacto:$("i-contacto").value,direccion:$("i-dir").value,condicion:$("i-cond").value,aplicacion:$("i-apl").value,modelo:$("i-mod").value,distribuidor:$("i-dist").value};
  }
  t.gar=gar;
  var resumen=(totalAcep>0?totalAcep+" acept.":"")+(totalAcep>0&&totalRech>0?" / ":"")+(totalRech>0?totalRech+" rech.":"");
  if(!esMixtoPendiente){
    if(totalAcep>0){ t.estado="NC"; t.nc=t.nc||{hecha:false}; }
    else { t.estado="GAR_RECHAZADA"; }
    t.historial.push({f:ahora,e:"Garantía revisada ("+resumen+")"+(totalAcep>0?" → NC":"")+" ("+me.name+")"});
  }else{
    t.historial.push({f:ahora,e:"Garantía revisada ("+resumen+") (parte de ticket mixto) ("+me.name+")"});
  }
  var faltaDev=false;
  if(esMixtoPendiente){
    t.garPendiente=false;
    if(t.devPendiente){ faltaDev=true; } else { finalizarMixto(t,ahora); }
  }
  await saveState(); cerrarModal(); render();
  if(hayRechazo){
    toast(faltaDev?"✓ Guardado. Falta revisar la devolución. Generando carta + informe…":"✓ Guardado. Generando carta + informe de los rechazados…");
    pdfCartaGar(id);
  }else{
    toast(faltaDev?"✓ Garantía aceptada. Falta revisar la devolución.":"✓ Garantía aceptada → NC.");
  }
}

}
function ncFechaRef(t){ return (t.nc&&t.nc.hecha&&t.fechas&&t.fechas.nc)?t.fechas.nc:t.fechaTicket; }
function ncFiltrar(lista){
  var f=ncFiltroFactura.trim().toUpperCase(), d=ncFiltroDesde, hh=ncFiltroHasta;
  return lista.filter(function(t){
    if(f && (String(t.numero||"")+" "+String(t.razonSocial||"")+" "+String(t.factura||"")+" "+String(t.guiaNumero||"")+" "+String(t.nc&&t.nc.numero||"")+" "+String(t.vendedor||"")).toUpperCase().indexOf(f)<0) return false;
    if(d||hh){ var fe=hoyStr(ncFechaRef(t)); if(d&&fe<d) return false; if(hh&&fe>hh) return false; }
    return true;
  });
}

async function agregarGuias(){
  var asesor=$("g-asesor").value, fecha=$("g-fecha").value, raw=$("g-numeros").value.trim();
  if(!raw){ toast("Escribe al menos un número de guía."); return; }
  if(!fecha){ toast("Selecciona la fecha."); return; }
  var nums=raw.split(/[\n,;\s]+/).map(function(s){return s.trim();}).filter(Boolean);
  if(nums.length===0){ toast("No se detectaron números."); return; }
  var fIso=new Date(fecha+"T"+new Date().toTimeString().slice(0,8)).toISOString();
  state.guias=state.guias||[];
  var ex={};
  state.guias.forEach(function(g){ if(g.estado!=="ANULADA") ex[g.numero+"|"+g.asesor]=1; });
  var ag=0, rep=0;
  nums.forEach(function(n){ if(ex[n+"|"+asesor]){ rep++; return; } state.guias.push({id:"G"+Date.now()+"_"+Math.random().toString(36).slice(2,6),numero:n,asesor:asesor,fechaCreacion:fIso,estado:"ACTIVA",creadaPor:me.name}); ag++; });
  await saveState(); toast("✓ "+ag+" guía(s) agregada(s)"+(rep?" · "+rep+" ya existían":"")); render();
}

function garCantAcep(t,i,x){
  if(t.gar&&t.gar.itemsAcep&&t.gar.itemsAcep[x]!==undefined) return t.gar.itemsAcep[x];
  if(t.gar&&t.gar.acepta===true) return llegoQ(i);   /* compat: tickets viejos aceptados completos */
  return 0;
}
function garCantRech(t,i,x){ return Math.max(0,llegoQ(i)-garCantAcep(t,i,x)); }
function garItemsRechazados(t){
  var out=[];
  t.items.forEach(function(i,x){ if(llegoQ(i)>0&&tipoDeItem(t,i)==="GARANTIA"){ var r=garCantRech(t,i,x); if(r>0) out.push({item:i,idx:x,cantRech:r}); } });
  return out;
}
function garHayRechazo(t){ return !!(t.gar)&&garItemsRechazados(t).length>0; }
function itemsAceptados(t){
  var out=[];
  t.items.forEach(function(i){
    if(i.dev&&i.dev.acepta&&i.dev.cantAcep>0){
      var f=i.cantidad?i.dev.cantAcep/i.cantidad:0;
      out.push(Object.assign({},i,{cantNC:i.dev.cantAcep,neto:i.neto*f,iva:i.iva*f,total:i.total*f}));
    }
  });
  if(t.gar){
    t.items.forEach(function(i,x){
      var q=llegoQ(i);
      if(q>0&&tipoDeItem(t,i)==="GARANTIA"){
        var cant=garCantAcep(t,i,x);
        if(cant>0){
          var f2=i.cantidad?cant/i.cantidad:0;
          out.push(Object.assign({},i,{cantNC:cant,neto:i.neto*f2,iva:i.iva*f2,total:i.total*f2}));
        }
      }
    });
  }
  return out;
}
function totalAceptado(t){ return itemsAceptados(t).reduce(function(s,i){return s+i.total;},0); }
function finalizarMixto(t,ahora){
  var tot=itemsAceptados(t).reduce(function(s,i){return s+i.total;},0);
  if(tot>0){ t.estado="NC"; t.nc=t.nc||{hecha:false}; t.historial.push({f:ahora,e:"Ticket mixto finalizado → NC ("+me.name+")"}); }
  else{ t.estado="RECHAZADA"; t.historial.push({f:ahora,e:"Ticket mixto finalizado: ninguna parte aceptada ("+me.name+")"}); }
}

function leerPdfNC(inp){
  var f=inp.files[0]; if(!f) return;
  if(f.size>3.5*1024*1024){ $("nc-pdf-info").innerHTML='<span style="color:var(--bad)">Más de 3.5 MB.</span>'; inp.value=""; return; }
  var rd=new FileReader(); rd.onload=function(){ ncPdfData={data:rd.result,name:f.name}; $("nc-pdf-info").textContent="Listo: "+f.name; }; rd.readAsDataURL(f);
}

function exportarNCConsolidado(){
  var lista=ncFiltrar(state.tickets.filter(function(t){return t.estado==="NC";})).slice();
  if(lista.length===0){ toast("No hay registros de NC para exportar con este filtro."); return; }
  var wb=XLSX.utils.book_new();
  var suf=(ncFiltroDesde||ncFiltroHasta)?("_"+(ncFiltroDesde||"inicio")+"_a_"+(ncFiltroHasta||"hoy")):"";

  /* Resumen a nivel de ticket */
  var rowsR=lista.map(function(t){
    var tot=totalAceptado(t);
    return {
      "N° TICKET":t.numero,"ORIGEN":t.motivo==="DACION EN PAGOS"?"Dación en pagos":(t.motivo==="DEVOLUCION Y REFACTURACION"?("Dev. y refacturación → "+(t.refactCliente||"")):((t.estado==="MIXTO"||(t.devSolicitado&&t.garSolicitado))?"Mixto":(t.motivo==="GARANTIAS"?"Garantía":"Devolución"))),
      "CLIENTE":t.razonSocial,"RUC":t.ruc||"","FACTURA":t.factura,"SUCURSAL":sucursalDe(t.factura).nombre,"VENDEDOR":t.vendedor,"MOTIVO":t.motivo,
      "FECHA TICKET":fdate(t.fechaTicket),"FECHA NC":t.fechas&&t.fechas.nc?fdate(t.fechas.nc):"",
      "TOTAL ACEPTADO":+tot.toFixed(2),"N° NC":t.nc.numero||"","ESTADO NC":t.nc.hecha?"NC HECHA":"PENDIENTE","TIENE PDF":t.nc.pdfKey?"SÍ":"NO"
    };
  });
  var wsR=XLSX.utils.json_to_sheet(rowsR);
  wsR["!cols"]=[{wch:12},{wch:12},{wch:30},{wch:14},{wch:14},{wch:20},{wch:18},{wch:30},{wch:12},{wch:12},{wch:14},{wch:16},{wch:13},{wch:10}];
  XLSX.utils.book_append_sheet(wb,wsR,"Resumen NC");

  /* Detalle a nivel de ítem aceptado, para gestionar la NC producto por producto */
  var rowsD=[];
  lista.forEach(function(t){

  if(desde||hasta) tks=tks.filter(function(t){ var f=hoyStr(t.fechaTicket); if(desde&&f<desde) return false; if(hasta&&f>hasta) return false; return true; });
  if(tks.length===0){ toast("No hay tickets en ese rango."); return; }
  var rows=tks.map(function(t){ return {"N° TICKET":t.numero,"GUIA":t.guiaNumero||"","SOBRE":t.sobre?"SÍ":"NO","SOBRE LLEGÓ":t.sobre?(t.sobreLlego===true?"SÍ":t.sobreLlego===false?"NO":"PENDIENTE"):"","SUCURSAL":sucursalDe(t.factura).nombre,"FECHA CREACION":fdatetime(t.fechaTicket),"FACTURA":t.factura,"FACTURADOR":t.facturador||"","EMISION":fdate(t.emision),"CLIENTE":t.razonSocial,"RUC":t.ruc||"","VENDEDOR":t.vendedor,"MOTIVO":t.motivo,"FECHA MERCADERIA":t.fechas&&t.fechas.mercaderia?fdatetime(t.fechas.mercaderia):"","FECHA DEVOLUCION":t.fechas&&t.fechas.devolucion?fdatetime(t.fechas.devolucion):"","FECHA GARANTIA":t.fechas&&t.fechas.garantia?fdatetime(t.fechas.garantia):"","FECHA AUTORIZACION DACION":t.fechas&&t.fechas.dacionAutorizacion?fdatetime(t.fechas.dacionAutorizacion):"","FECHA NC":t.fechas&&t.fechas.nc?fdatetime(t.fechas.nc):"","N° NC":t.nc&&t.nc.numero?t.nc.numero:"","ESTADO NC":t.nc?(t.nc.hecha?"HECHA":"PENDIENTE"):"","ESTADO":ESTADO_LABEL[t.estado]||t.estado,"GUIA INCORRECTA":t.guiaIncorrecta?t.guiaIncorrecta.motivo:"","TOTAL TICKET":+t.items.reduce(function(s,i){return s+i.total;},0).toFixed(2),"TOTAL ACEPTADO":(t.estado==="NC"||(t.fechas&&t.fechas.nc))?+totalAceptado(t).toFixed(2):""}; });
  var ws=XLSX.utils.json_to_sheet(rows), wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,"Consolidado");
  var suf=(desde||hasta)?("_"+(desde||"inicio")+"_a_"+(hasta||"hoy")):"";
  XLSX.writeFile(wb,"Reporte_Consolidado"+suf+".xlsx");
}
function adminVerGuias(){
  var guias=(state.guias||[]).slice().reverse();
  var h='<div class="modal-bg"><div class="modal"><h2 style="font-size:24px;color:var(--navy);margin-bottom:10px">Administrar guías</h2>';
  if(guias.length===0) h+='<div class="empty"><div class="big">Sin guías</div></div>';
  else h+='<div style="overflow-x:auto"><table><thead><tr><th>N° Guía</th><th>Asesor</th><th>Fecha</th><th>Estado</th><th>Tickets</th><th></th></tr></thead><tbody>'+guias.map(function(g){ var usada=guiaUsadaEnTickets(g.id); var tks=state.tickets.filter(function(t){return t.estado!=="ELIMINADO"&&t.guiaId===g.id;}); var et=g.estado==="ANULADA"?'<span class="tag tag-bad">Anulada</span>':(usada?'<span class="tag tag-nc">Usada</span>':'<span class="tag tag-merc">Activa</span>'); return '<tr><td><b>'+esc(g.numero)+'</b></td><td>'+esc(g.asesor)+'</td><td>'+fdate(g.fechaCreacion)+'</td><td>'+et+'</td><td>'+(tks.map(function(t){return esc(t.numero);}).join(", ")||"—")+'</td><td>'+(g.estado!=="ANULADA"?'<button class="btn btn-bad btn-sm" onclick="abrirAnularGuia(\''+g.id+'\')">Anular</button>':'<span class="muted">'+esc(g.anulacion&&g.anulacion.por||"")+'</span>')+'</td></tr>'; }).join("")+'</tbody></table></div>';
  h+='<div style="text-align:right;margin-top:12px"><button class="btn btn-p" onclick="cerrarModal()">Cerrar</button></div></div></div>';
  $("modal-root").innerHTML=h;
}
function abrirAnularGuia(id){
  if(!puedeActuar()){ toast("👁 Modo solo lectura.",4000); return; }
  var g=findGuia(id);
  $("modal-root").innerHTML='<div class="modal-bg"><div class="modal" style="max-width:480px"><h2 style="font-size:22px;color:var(--bad);margin-bottom:8px">Anular guía '+esc(g.numero)+'</h2><div class="muted" style="margin-bottom:14px">Asesor: '+esc(g.asesor)+' · '+fdate(g.fechaCreacion)+'</div><div class="field"><label>Motivo de anulación</label><textarea id="anul-motivo" rows="3"></textarea></div><div style="display:flex;gap:10px;justify-content:flex-end"><button class="btn btn-g" onclick="adminVerGuias()">Cancelar</button><button class="btn btn-bad" onclick="confirmarAnularGuia(\''+g.id+'\')">Anular</button></div></div></div>';
}
async function confirmarAnularGuia(id){
  if(!puedeActuar()){ toast("👁 Modo solo lectura.",4000); return; }
  var motivo=$("anul-motivo").value.trim(); if(!motivo){ toast("Escribe el motivo."); return; }
  var g=findGuia(id); g.estado="ANULADA"; g.anulacion={por:me.name,f:new Date().toISOString(),motivo:motivo};
  await saveState(); toast("✓ Guía "+g.numero+" anulada."); cerrarModal(); render();
}
function abrirEliminar(id){
  if(!puedeActuar()){ toast("👁 Modo solo lectura: no puedes eliminar tickets fuera de tu propia pestaña.",4000); return; }
  var t=findT(id);
  $("modal-root").innerHTML='<div class="modal-bg"><div class="modal" style="max-width:520px"><h2 style="font-size:22px;color:var(--bad);margin-bottom:8px">Eliminar ticket '+esc(t.numero)+'</h2><div class="muted" style="margin-bottom:14px">'+esc(t.razonSocial)+' · Factura '+esc(t.factura)+'</div><div class="field"><label>Motivo de eliminación</label><textarea id="del-motivo" rows="3"></textarea></div><div style="display:flex;gap:10px;justify-content:flex-end"><button class="btn btn-g" onclick="cerrarModal()">Cancelar</button><button class="btn btn-bad" onclick="confirmarEliminar(\''+t.id+'\')">Eliminar</button></div></div></div>';
}
async function confirmarEliminar(id){
  if(!puedeActuar()){ toast("👁 Modo solo lectura.",4000); return; }
  var motivo=$("del-motivo").value.trim(); if(!motivo){ toast("Escribe el motivo."); return; }
  var t=findT(id), ahora=new Date().toISOString();
  t.estadoAnterior=t.estado; t.estado="ELIMINADO"; t.eliminacion={motivo:motivo,por:me.name,f:ahora};
  t.historial.push({f:ahora,e:"Eliminado por "+me.name+". Motivo: "+motivo});
  await saveState(); cerrarModal(); toast("✓ Ticket "+t.numero+" eliminado."); render();
}
function abrirLimpiarTodo(){
  if(!puedeActuar()){ toast("👁 Modo solo lectura: no puedes borrar datos fuera de tu propia pestaña.",4000); return; }
  $("modal-root").innerHTML='<div class="modal-bg"><div class="modal" style="max-width:520px"><h2 style="font-size:22px;color:var(--bad);margin-bottom:8px">⚠ Borrar datos de prueba</h2><div class="muted" style="margin-bottom:14px">Se borrarán <b>'+state.tickets.length+' ticket(s)</b> y <b>'+(state.guias||[]).length+' guía(s)</b>. Los contadores vuelven a 0001. La base de facturas NO se toca. <b>No se puede deshacer.</b><br><br>Escribe <b>BORRAR</b> para confirmar:</div><div class="field"><input id="conf-borrar" placeholder="Escribe BORRAR" autocomplete="off"></div><div style="display:flex;gap:10px;justify-content:flex-end"><button class="btn btn-g" onclick="cerrarModal()">Cancelar</button><button class="btn btn-bad" onclick="ejecutarLimpiarTodo()">Borrar todo</button></div></div></div>';
}
async function ejecutarLimpiarTodo(){
  if(!puedeActuar()){ toast("👁 Modo solo lectura.",4000); return; }
  if(($("conf-borrar").value||"").trim().toUpperCase()!=="BORRAR"){ toast("Escribe BORRAR para confirmar."); return; }
  state.tickets=[]; state.guias=[]; state.sobres=[]; state.seq3200=0; state.seq5200=0; state.seq2200=0;
  await saveState();
  try{ if(fbReady){ await fbDB.ref("ncpdf").remove(); await fbDB.ref("contadores").remove(); } }catch(e){}
  cerrarModal(); toast("✓ Datos de prueba borrados."); render();
}
