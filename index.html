<style>

<script>
/* ============================================================
   CONFIGURACIÓN GOOGLE SHEETS
   La hoja debe estar publicada en la web como CSV.
   URL: archivo → publicar en la web → CSV → hoja1
   ============================================================ */
/* DOS vías de acceso a la misma hoja: se prueban ambas automáticamente. */
// Vía principal: URL de publicación CSV exacta (con gid de la hoja). Esta es la confirmada.
const CSV_PUB = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTpOv2PFreipcoBc7ry-bD3QSRbqD49nQicajrI86pDAuUuQkbPoiszwxmt2HQbodo4zAlHI2rvknPk/pub?gid=1814361639&single=true&output=csv";
// Vías de respaldo: ID normal (si está compartida como pública)
const SHEETS_ID = "19WwKz-OjCCylK-crbwRu61d3A2q4ophHbRNAguyUtl8";
const CSV_GVIZ = `https://docs.google.com/spreadsheets/d/${SHEETS_ID}/gviz/tq?tqx=out:csv&gid=1814361639`;
const CSV_EXPORT = `https://docs.google.com/spreadsheets/d/${SHEETS_ID}/export?format=csv&gid=1814361639`;
// Lista de URLs base a intentar (en orden). La confirmada va primero.
const CSV_URLS = [CSV_PUB, CSV_GVIZ, CSV_EXPORT];

/* ============================================================ USUARIOS ============================================================ */
const USERS = [
 ...[["JOSUE PINEDA","1999"],["CARLOS HERRERA","2000"],["MOISES MOLINA","5003"],["SEBASTIAN VANEGAS","8001"],
 ["DANIEL ESPAÑA","1552"],["FERNANDO MEZA","3225"],["PABLO PERALTA","4550"],["CRISTIAN SALAZAR","4888"],
 ["CARLOS GRANJA","7810"],["CRISTINA CIFUENTES","8520"],["EDISON MAYORGA","6588"],["EDUARDO PICO","0458"],
 ["STALIN COBA","2150"],["MABEL JACOME","0545"],["DIEGO ACHACHI","0254"],["CALL CENTER 1","8054"]]
   .map(([n,p])=>({name:n,pass:p,role:"ASESOR"})),
 {name:"ANTHONY SANTILLAN (Mercadería)",pass:"1125",role:"MERCADERIA"},
 {name:"REVISOR MER1",pass:"1126",role:"MERCADERIA"},
 {name:"ANTHONY SANTILLAN (Devolución)",pass:"1255",role:"DEVOLUCION"},
 {name:"REVISOR DEV1",pass:"1256",role:"DEVOLUCION"},
 {name:"WILLIAM MANOTOA",pass:"5554",role:"GARANTIA"},
 {name:"REVISOR GAR1",pass:"5556",role:"GARANTIA"},
 {name:"JESSICA ANJA",pass:"1984",role:"NC"},
 {name:"REVISOR NC1",pass:"1985",role:"NC"},
 {name:"BELEN MANZANO",pass:"1112",role:"ADMIN"},
 {name:"WILLIAM ACHACHI",pass:"1113",role:"ADMIN"},
 {name:"TANNIA BASSANTES",pass:"1114",role:"ADMIN"},
];
/* Usuarios que pueden cambiar entre TODOS los paneles (no solo admin) */
const SUPER_ADMINS=["BELEN MANZANO","TANNIA BASSANTES"];
/* Vista actualmente activa para un super admin (null = su panel normal admin) */
let vistaActiva=null;
const VISTAS=[
  {role:"ASESOR",label:"Asesor"},
  {role:"MERCADERIA",label:"Rev. Mercadería"},
  {role:"DEVOLUCION",label:"Rev. Devolución"},
  {role:"GARANTIA",label:"Rev. Garantía"},
  {role:"NC",label:"Notas de crédito"},
  {role:"ADMIN",label:"Administrativo"},
];
const ROLE_LABEL={ASESOR:"Asesor comercial",MERCADERIA:"Revisión de mercadería",DEVOLUCION:"Revisión de devolución",GARANTIA:"Revisión de garantía",NC:"Notas de crédito",ADMIN:"Administrativo"};
const MOTIVOS=["DACION EN PAGOS","GESTION COMERCIAL CLIENTE VENDEDOR","LOGISTICA BODEGA","DEVOLUCION","GARANTIAS"];
const MARCAS=["PERMATEX","ORIGINAL","VALEO","MAHLE","ABRO","LUBA AUTOPARTS","SEIWA","NPR","SABO","APLIC","JCC","MAGNETI MARELLI","AUTOTOP","OTRO"];
const ESTADO_LABEL={MERCADERIA:"En revisión mercadería",DEVOLUCION:"En revisión devolución",GARANTIA:"En revisión garantía",NC:"En notas de crédito",NO_LLEGO:"No llegó",DEV_RECHAZADA:"Devolución no aceptada",GAR_RECHAZADA:"Garantía no aceptada",GUIA_INCORRECTA:"Devuelto por guía incorrecta",ELIMINADO:"Eliminado"};
const MESES=["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];

let me=null, base=[], RAZONES=[];
/* state guarda tickets, secuencias y GUIAS; persiste en Firebase Realtime Database */
let state={seq3200:0,seq5200:0,tickets:[],guias:[]};
/* Caché en memoria de la base de facturas; se recarga desde Sheets solo si es necesario */
let baseLoaded=false, baseFechaStr="", baseLineas=0;

/* ============================================================ GUÍAS (helpers) ============================================================ */
/* Estructura de una guía:
   {id, numero, asesor, fechaCreacion(ISO), estado:"ACTIVA"|"USADA"|"ANULADA",
    creadaPor, anulacion:{por,f,motivo}} */
function hoyStr(d){ const x=d?new Date(d):new Date(); return x.getFullYear()+"-"+String(x.getMonth()+1).padStart(2,"0")+"-"+String(x.getDate()).padStart(2,"0"); }
function findGuia(id){ return (state.guias||[]).find(g=>g.id===id); }
/* Guías que un asesor puede seleccionar HOY: suyas, no anuladas, creadas hoy */
function guiasSeleccionables(asesor){
  const hoy=hoyStr();
  return (state.guias||[]).filter(g=>g.asesor===asesor && g.estado!=="ANULADA" && hoyStr(g.fechaCreacion)===hoy);
}
/* ¿La guía fue usada en algún ticket activo? */
function guiaUsadaEnTickets(guiaId){
  return state.tickets.some(t=>t.estado!=="ELIMINADO" && t.guiaId===guiaId);
}

/* ============================================================ FIREBASE ============================================================ */
const firebaseConfig = {
  apiKey: "AIzaSyDI_Xszfjw9f_O1CsL0VC8F_dNtWGEvmo8",
  authDomain: "devoluciones-y-garantias.firebaseapp.com",
  databaseURL: "https://devoluciones-y-garantias-default-rtdb.firebaseio.com",
  projectId: "devoluciones-y-garantias",
  storageBucket: "devoluciones-y-garantias.firebasestorage.app",
  messagingSenderId: "1009454788938",
  appId: "1:1009454788938:web:aa7dc86d838f0c6d2051b3"
};
let fbApp=null, fbDB=null, fbReady=false, fbSuscrito=false, guardando=false;
function initFirebase(){
  try{
    if(typeof firebase==="undefined") throw new Error("SDK de Firebase no cargó (revisa conexión)");
    fbApp=firebase.initializeApp(firebaseConfig);
    fbDB=firebase.database();
    fbReady=true;
    return true;
  }catch(e){
    console.error("Firebase init:",e);
    toast("⚠ No se pudo conectar a Firebase: "+(e&&e.message||e),6000);
    return false;
  }
}
/* Carga inicial + suscripción en tiempo real.
   Cuando otro usuario crea/modifica un ticket, la vista se actualiza sola. */
function suscribirEstado(onPrimera){
  if(!fbReady){ if(onPrimera) onPrimera(); return; }
  const ref=fbDB.ref("estado");
  let primera=true;
  ref.on("value",snap=>{
    const val=snap.val();
    if(val){
      state={
        seq3200:val.seq3200||0,
        seq5200:val.seq5200||0,
        tickets:Array.isArray(val.tickets)?val.tickets:(val.tickets?Object.values(val.tickets):[]),
        guias:Array.isArray(val.guias)?val.guias:(val.guias?Object.values(val.guias):[])
      };
    }else{
      state={seq3200:0,seq5200:0,tickets:[],guias:[]};
    }
    if(primera){ primera=false; if(onPrimera) onPrimera(); }
    else if(me){ render(); } // actualización en vivo desde otro dispositivo
  },err=>{
    console.error("Firebase read:",err);
    toast("⚠ Error leyendo de Firebase: "+(err&&err.message||err),5000);
    if(primera){ primera=false; if(onPrimera) onPrimera(); }
  });
  fbSuscrito=true;
}
async function saveState(){
  if(!fbReady){ toast("⚠ Sin conexión a Firebase. Los cambios no se guardaron."); return; }
  guardando=true;
  try{
    await fbDB.ref("estado").set({
      seq3200:state.seq3200||0,
      seq5200:state.seq5200||0,
      tickets:state.tickets||[],
      guias:state.guias||[],
      _updated:firebase.database.ServerValue.TIMESTAMP
    });
  }catch(e){
    console.error("Firebase write:",e);
    toast("⚠ Error guardando en Firebase: "+(e&&e.message||e),6000);
  }finally{ guardando=false; }
}
/* Guardar el PDF de una NC en Firebase (como dataURL en su propio nodo) */
async function guardarPdfNC(ticketId,pdfObj){
  if(!fbReady) throw new Error("Sin conexión a Firebase");
  await fbDB.ref("ncpdf/"+ticketId).set(pdfObj);
}
async function leerPdfNCfb(ticketId){
  if(!fbReady) throw new Error("Sin conexión a Firebase");
  const snap=await fbDB.ref("ncpdf/"+ticketId).get();
  return snap.val();
}

/* ============================================================ BASE DE FACTURAS EN FIREBASE ============================================================ */
/* Guardamos la base comprimida por diccionario: los textos repetidos (cliente, descripción,
   factura, facturador, etc.) se guardan UNA sola vez. Reduce el tamaño ~70%. */
function comprimirBase(rows){
  const pool=[], map=new Map();
  const idx=s=>{ s=String(s??""); if(map.has(s))return map.get(s); const i=pool.length; pool.push(s); map.set(s,i); return i; };
  const r=rows.map(x=>[idx(x.emision),idx(x.factura),idx(x.ruc),idx(x.razon),idx(x.codigo),idx(x.desc),idx(x.sub),idx(x.facturador),x.cant,x.neto,x.iva,x.total]);
  return {v:1,p:pool,r};
}
function descomprimirBase(obj){
  if(!obj||!obj.r) return [];
  const p=obj.p;
  return obj.r.map(a=>({emision:p[a[0]],factura:p[a[1]],ruc:p[a[2]],razon:p[a[3]],codigo:p[a[4]],desc:p[a[5]],sub:p[a[6]],facturador:p[a[7]],cant:a[8],neto:a[9],iva:a[10],total:a[11]}));
}
/* Firebase Realtime DB tiene límite por nodo; partimos en bloques de ~250KB de JSON. */
const FB_CHUNK=200000;
async function subirBaseAFirebase(rows,onProg){
  if(!fbReady) throw new Error("Sin conexión a Firebase");
  const comp=comprimirBase(rows);
  const json=JSON.stringify(comp);
  // partir en bloques
  const chunks=[];
  for(let i=0;i<json.length;i+=FB_CHUNK) chunks.push(json.slice(i,i+FB_CHUNK));
  if(onProg) onProg("Subiendo base a Firebase ("+chunks.length+" bloques)…",70);
  // borrar base anterior y escribir la nueva
  await fbDB.ref("baseFacturas").remove();
  const meta={n:chunks.length,rows:rows.length,ts:new Date().toISOString(),por:me?me.name:""};
  for(let i=0;i<chunks.length;i++){
    if(onProg) onProg("Subiendo bloque "+(i+1)+"/"+chunks.length+"…",70+Math.round((i+1)/chunks.length*25));
    await fbDB.ref("baseFacturas/chunks/"+i).set(chunks[i]);
  }
  await fbDB.ref("baseFacturas/meta").set(meta);
  return meta;
}
async function leerBaseDeFirebase(onProg){
  if(!fbReady) return null;
  const metaSnap=await fbDB.ref("baseFacturas/meta").get();
  const meta=metaSnap.val();
  if(!meta||!meta.n) return null;
  if(onProg) onProg("Leyendo base desde Firebase…",20);
  let json="";
  for(let i=0;i<meta.n;i++){
    if(onProg) onProg("Cargando bloque "+(i+1)+"/"+meta.n+"…",20+Math.round((i+1)/meta.n*50));
    const c=await fbDB.ref("baseFacturas/chunks/"+i).get();
    json+=c.val()||"";
  }
  const comp=JSON.parse(json);
  return {rows:descomprimirBase(comp),meta};
}

/* ============================================================ CARGA BASE DESDE GOOGLE SHEETS ============================================================ */
/* La base de facturas se carga directo del CSV público de Sheets.
   Se cachea en memoria por sesión. El admin puede forzar recarga. */
/* ============================================================ CARGA DE BASE (Firebase primero, Sheets de respaldo) ============================================================ */
/* Estrategia rápida: lee la base ya guardada en Firebase (veloz). Si no existe,
   cae a Google Sheets. El admin actualiza Firebase con el botón correspondiente. */
async function cargarBase(forzar=false, onProg=null){
  if(baseLoaded&&!forzar) return;
  // 1) Intentar Firebase (rápido) con tope de tiempo
  try{
    if(onProg) onProg("Buscando base en Firebase…",10);
    const res=await Promise.race([
      leerBaseDeFirebase(onProg),
      new Promise((_,rej)=>setTimeout(()=>rej(new Error("timeout Firebase")),20000))
    ]);
    if(res&&res.rows&&res.rows.length){
      base=res.rows; indexarBase(); baseLoaded=true; baseLineas=base.length;
      baseFechaStr="Firebase · "+(res.meta.ts?new Date(res.meta.ts).toLocaleString("es-EC"):"");
      actualizarChipBase();
      if(onProg) onProg("Base lista: "+base.length.toLocaleString("es-EC")+" líneas (Firebase)",100);
      return;
    }
  }catch(e){ console.warn("Base Firebase falló o no existe, uso Sheets:",e&&e.message); }
  // 2) Respaldo: Google Sheets
  if(onProg) onProg("Cargando desde Google Sheets…",15);
  await cargarBaseDesdeSheets(true,onProg);
}

async function cargarBaseDesdeSheets(forzar=false, onProg=null){
  if(baseLoaded&&!forzar) return; // ya en memoria
  if(onProg) onProg("Descargando base de facturas desde Google Sheets…", 10);
  let csvText=null, ultimoError="";

  // Probamos cada URL base, y para cada una varios métodos (directo + proxies),
  // hasta que alguna combinación devuelva un CSV válido.
  // Se agrega un parámetro único (_=timestamp) para EVITAR caché: así siempre
  // se descarga la versión más reciente del Excel (si borraste facturas, se reflejan).
  const cacheBuster="&_="+Date.now();
  const conBuster=u=> u + (u.includes("?")?cacheBuster:"?"+cacheBuster.slice(1));
  const fetchTexto=async(metodo,url)=>{
    const u=conBuster(url);
    const opts={cache:"no-store"}; // fuerza descarga fresca, ignora caché del navegador
    if(metodo==="directo"){ const r=await fetch(u,opts); if(!r.ok)throw new Error("HTTP "+r.status); return await r.text(); }
    if(metodo==="allorigins_raw"){ const r=await fetch("https://api.allorigins.win/raw?url="+encodeURIComponent(u),opts); if(!r.ok)throw new Error("HTTP "+r.status); return await r.text(); }
    if(metodo==="corsproxy"){ const r=await fetch("https://corsproxy.io/?url="+encodeURIComponent(u),opts); if(!r.ok)throw new Error("HTTP "+r.status); return await r.text(); }
    if(metodo==="allorigins_get"){ const r=await fetch("https://api.allorigins.win/get?url="+encodeURIComponent(u)+"&_="+Date.now(),opts); if(!r.ok)throw new Error("HTTP "+r.status); const j=await r.json(); return j.contents; }
    if(metodo==="codetabs"){ const r=await fetch("https://api.codetabs.com/v1/proxy/?quest="+encodeURIComponent(u),opts); if(!r.ok)throw new Error("HTTP "+r.status); return await r.text(); }
  };
  const metodos=["directo","allorigins_raw","corsproxy","allorigins_get","codetabs"];
  const esValido=txt=> txt && txt.length>50 && !txt.trim().toLowerCase().startsWith("<!doctype") && !txt.trim().toLowerCase().startsWith("<html") && txt.includes(",");

  let intento=0; const totalIntentos=CSV_URLS.length*metodos.length;
  for(const url of CSV_URLS){
    for(const metodo of metodos){
      intento++;
      try{
        if(onProg) onProg("Conectando con Google Sheets ("+intento+"/"+totalIntentos+")…", 10+Math.round(intento/totalIntentos*40));
        const txt=await fetchTexto(metodo,url);
        if(esValido(txt)){ csvText=txt; break; }
        ultimoError="Respuesta no válida (¿hoja sin permiso público?)";
      }catch(e){ ultimoError=(e&&e.message)||String(e); }
    }
    if(csvText) break;
  }

  if(!csvText){
    throw new Error("No se pudo descargar la base. "+ultimoError+". Comparte la hoja como 'Cualquiera con el enlace' o publícala como CSV.");
  }
  if(onProg) onProg("Procesando filas…", 60);
  base = parsearCSV(csvText);   // reemplaza completamente la base anterior
  indexarBase();
  baseLoaded=true;
  baseLineas=base.length;
  baseFechaStr="Actualizada: "+new Date().toLocaleString("es-EC",{day:"2-digit",month:"2-digit",year:"numeric",hour:"2-digit",minute:"2-digit"});
  actualizarChipBase();
  if(onProg) onProg("Base lista: "+base.length.toLocaleString("es-EC")+" líneas", 100);
}

function parsearCSV(text){
  // Parser CSV robusto (maneja comillas, saltos, etc.)
  const norm=k=>String(k||"").trim().toUpperCase().replace(/\s+/g," ");
  const rows=[];
  const lines=text.split(/\r?\n/);
  if(lines.length<2) return [];
  // Detectar separador
  const sep=lines[0].includes(";")?";":",";
  const headers=splitCSVLine(lines[0],sep).map(norm);
  const idx=h=>headers.indexOf(h);
  const iEmi=idx("EMISION"), iFact=idx("FACTURA"), iRuc=idx("IDENTIFICACION"), iRazon=idx("RAZON SOCIAL");
  const iCod=idx("CODIGO PRODUCTO"), iDesc=idx("DESCRIPCION PRODUCTO"), iSub=idx("SUBGRUPO");
  const iCant=idx("CANTIDAD"), iNeto=idx("PRECIO TOTAL NETO"), iIva=idx("IVA TOTAL"), iTot=idx("TOTAL PRODUCTO");
  const iFact2=idx("FACTURADOR");
  for(let i=1;i<lines.length;i++){
    if(!lines[i].trim()) continue;
    const c=splitCSVLine(lines[i],sep);
    const fact=String(c[iFact]||"").trim();
    const razon=String(c[iRazon]||"").trim();
    if(!fact||!razon) continue;
    rows.push({emision:String(c[iEmi]||"").trim(),factura:fact,ruc:String(c[iRuc]||"").trim(),
      razon,codigo:String(c[iCod]||"").trim(),desc:String(c[iDesc]||"").trim(),sub:String(c[iSub]||"").trim(),
      facturador:String(c[iFact2]||"").trim(),
      cant:+(c[iCant]||0)||0,neto:+(c[iNeto]||0)||0,iva:+(c[iIva]||0)||0,total:+(c[iTot]||0)||0});
  }
  return rows;
}
function splitCSVLine(line,sep=","){
  const cols=[]; let cur="", inQ=false;
  for(let i=0;i<line.length;i++){
    const c=line[i];
    if(c==='"'){if(inQ&&line[i+1]==='"'){cur+='"';i++;}else inQ=!inQ;}
    else if(c===sep&&!inQ){cols.push(cur);cur="";}
    else cur+=c;
  }
  cols.push(cur);
  return cols;
}
function indexarBase(){ RAZONES=[...new Set(base.map(r=>r.razon.trim()))].sort(); }

  // 1) Conectar y suscribirse a Firebase (tickets en tiempo real)

      <input type="text" id="n-srch" placeholder="Buscar código o descripción dentro de la factura…" value="${esc(filtroItems)}" oninput="filtroItems=this.value;renderItemsNuevo()">

    </div>

    </tbody></table></div>
    <div class="muted" style="margin-top:4px" id="n-count"></div>`;
  const tbody=$("n-tbody");
  let shown=0;
  lineas.forEach((r,i)=>{
    const dup=usados.get(r.codigo);
    const txt=(r.codigo+" "+r.desc+" "+r.sub).toUpperCase();
    if(q&&!txt.includes(q)) return;
    shown++;
    const hlCod=q?r.codigo.replace(new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),"gi"),m=>`<span class="hl">${m}</span>`):esc(r.codigo);
    const tr=document.createElement("tr");
    tr.innerHTML=`<td><b>${hlCod}</b>${dup?`<br><span class="tag tag-bad">En ticket ${esc(dup)}</span>`:""}</td>
      <td style="max-width:280px;font-size:12px">${esc(r.desc)}<div class="muted">${esc(r.sub)}</div></td>
      <td class="num">${r.cant}</td>
      <td><input type="number" min="0" max="${r.cant}" value="0" id="q-${i}" oninput="nCalc(${i})" style="text-align:right" ${dup?"disabled":""}></td>
      <td><input id="c-${i}" placeholder="Comentario" ${dup?"disabled":""}></td>
      <td class="num" id="pn-${i}">$0.00</td><td class="num" id="tt-${i}">$0.00</td>`;
    tbody.appendChild(tr);
  });
  if($("n-count")) $("n-count").textContent=q?`Mostrando ${shown} de ${lineas.length} productos`:`${lineas.length} productos en esta factura`;
  if(shown===0&&q) tbody.innerHTML=`<tr><td colspan="7" class="muted" style="text-align:center;padding:20px">Sin resultados para "${esc(filtroItems)}"</td></tr>`;
}
function nCalc(i){
  const r=nuevo.lineas[i]; if(!r) return;
  let q=Math.max(0,Math.min(r.cant,+($("q-"+i)?$("q-"+i).value:0))); if($("q-"+i)) $("q-"+i).value=q;
  const f=r.cant?q/r.cant:0;
  if($("pn-"+i)) $("pn-"+i).textContent=money(r.neto*f);
  if($("tt-"+i)) $("tt-"+i).textContent=money(r.total*f);
}
function nNum(){
  const m=$("n-motivo").value; nuevo.motivo=m;
  if(!m){$("n-num").value="";return;}
  const gar=m==="GARANTIAS"; const next=gar?state.seq5200+1:state.seq3200+1;
  $("n-num").value=(gar?"5200":"3200")+"-"+String(next).padStart(4,"0");
}
async function guardarTicket(){
  const guiaId=$("n-guia").value;
  if(!guiaId){ toast("⭐ Debes seleccionar una guía. Sin guía no se puede crear el ticket."); return; }
  const guia=findGuia(guiaId);
  if(!guia||guia.estado==="ANULADA"||hoyStr(guia.fechaCreacion)!==hoyStr()){ toast("Esa guía ya no es válida hoy. Recarga e intenta de nuevo."); return; }
  if(!nuevo.razon||!nuevo.factura){toast("Selecciona razón social y factura.");return;}
  if(!nuevo.motivo){toast("Selecciona el motivo del ticket.");return;}
  const usados=codigosUsados(nuevo.factura);
  const items=[]; let repetido=null;
  nuevo.lineas.forEach((r,i)=>{
    const el=$("q-"+i); if(!el) return;
    const q=+(el.value||0); if(q<=0) return;
    if(usados.has(r.codigo)){repetido=r.codigo+" (ticket "+usados.get(r.codigo)+")";return;}
    const f=q/r.cant;
    items.push({codigo:r.codigo,desc:r.desc,sub:r.sub,cantidad:q,comVendedor:($("c-"+i)?.value||"").trim(),
      neto:+(r.neto*f).toFixed(4),iva:+(r.iva*f).toFixed(4),total:+(r.total*f).toFixed(4)});
  });
  if(repetido){toast("El código "+repetido+" ya está en otro ticket activo. Elimínalo primero.");return;}
  if(items.length===0){toast("Ingresa cantidad en al menos un producto.");return;}
  const gar=nuevo.motivo==="GARANTIAS"; if(gar) state.seq5200++; else state.seq3200++;
  const num=(gar?"5200":"3200")+"-"+String(gar?state.seq5200:state.seq3200).padStart(4,"0");
  const sobre=$("n-sobre")?$("n-sobre").checked:false;
  const t={id:"T"+Date.now(),numero:num,motivo:nuevo.motivo,razonSocial:nuevo.razon,ruc:nuevo.ruc,
    factura:nuevo.factura,emision:nuevo.emision,facturador:nuevo.facturador||"",fechaTicket:new Date().toISOString(),
    vendedor:me.name,estado:"MERCADERIA",items,fechas:{},
    guiaId:guia.id, guiaNumero:guia.numero, sobre,
    historial:[{f:new Date().toISOString(),e:"Ticket creado por "+me.name+" · Guía "+guia.numero+(sobre?" · con sobre":"")}]};
  state.tickets.push(t); await saveState();
  $("modal-root").innerHTML=""; toast("✓ Ticket "+num+" creado con guía "+guia.numero+".");
  setTimeout(()=>imprimirTicket(t.id),400);
  render();
}

function histTable(role){

function revisar(role,id){

function mercTodo(id,todo){
  const t=findT(id);
  t.items.forEach((i,x)=>{const el=$("m-q-"+x);if(el)el.value=todo?i.cantidad:0;});
}
async function guardarMerc(id){
  const t=findT(id);
  const guiaOk=$("m-guia")?$("m-guia").value:"1";
  if(guiaOk===""){ toast("Indica si la guía es correcta."); return; }
  const ahora=new Date().toISOString();
  // Guía incorrecta → devolver ticket, la guía vuelve a quedar activa (al quitar guiaId del ticket)
  if(guiaOk==="0"){
    const motivo=($("m-guia-com")?$("m-guia-com").value:"").trim()||"Guía incorrecta";
    t.fechas=t.fechas||{}; t.fechas.mercaderia=ahora;
    t.guiaIncorrecta={motivo,por:me.name,f:ahora};
    t.guiaId=null; // libera la guía → vuelve a estar activa
    t.estado="GUIA_INCORRECTA";
    t.historial.push({f:ahora,e:"Devuelto por guía incorrecta ("+me.name+"). Motivo: "+motivo+". Guía liberada."});
    await saveState();$("modal-root").innerHTML="";toast("Ticket devuelto por guía incorrecta. La guía volvió a estar activa.");render();
    return;
  }
  // Guía correcta → revisar cantidades
  for(let x=0;x<t.items.length;x++){if(!$("m-q-"+x)||$("m-q-"+x).value===""){toast("Digita la cantidad llegada en todos los productos.");return;}}
  // Confirmación del sobre (si el ticket lo declaró)
  if(t.sobre){
    const sobreLlego=$("m-sobre")?$("m-sobre").value:"";
    if(sobreLlego===""){ toast("Indica si el sobre llegó."); return; }
    t.sobreLlego=(sobreLlego==="1");
  }
  t.guiaValidada={por:me.name,f:ahora};
  t.items.forEach((i,x)=>{const q=Math.max(0,Math.min(i.cantidad,+($("m-q-"+x).value||0)));i.merc={cantLlegada:q,com:$("m-co-"+x).value,por:me.name,f:ahora};});
  t.fechas=t.fechas||{};t.fechas.mercaderia=ahora;
  const totLlego=t.items.reduce((s,i)=>s+llegoQ(i),0);
  if(totLlego===0){t.estado="NO_LLEGO";t.historial.push({f:ahora,e:"No llegó mercadería. Guía OK. "+me.name});}
  else if(t.motivo==="GARANTIAS"){t.estado="GARANTIA";t.historial.push({f:ahora,e:"Guía OK. Mercadería recibida → garantía ("+me.name+")"});}
  else{t.estado="DEVOLUCION";t.historial.push({f:ahora,e:"Guía OK. Mercadería recibida → devolución ("+me.name+")"});}
  await saveState();$("modal-root").innerHTML="";toast("✓ Revisión de mercadería guardada.");render();
}

async function guardarDev(id){
  const t=findT(id);
  const idxs=t.items.map((i,x)=>llegoQ(i)>0?x:-1).filter(x=>x>=0);
  for(const x of idxs){if($("d-ac-"+x).value===""){toast("Selecciona la decisión en todos los productos.");return;}}
  const ahora=new Date().toISOString();
  idxs.forEach(x=>{const i=t.items[x];const max=llegoQ(i);
    i.dev={acepta:$("d-ac-"+x).value==="1",cantAcep:Math.max(0,Math.min(max,+($("d-ca-"+x).value||0))),com:$("d-co-"+x).value,por:me.name,f:ahora};});
  t.fechas=t.fechas||{};t.fechas.devolucion=ahora;
  const alguna=idxs.some(x=>t.items[x].dev.acepta&&t.items[x].dev.cantAcep>0);
  if(alguna){t.estado="NC";t.nc=t.nc||{hecha:false};t.historial.push({f:ahora,e:"Devolución aceptada → NC ("+me.name+")"});}
  else{t.estado="DEV_RECHAZADA";t.historial.push({f:ahora,e:"Devolución no aceptada ("+me.name+")"});}
  await saveState();$("modal-root").innerHTML="";toast("✓ Revisión de devolución guardada.");render();
}

function cargarFotos(inp){
  [...inp.files].forEach(f=>{
    const img=new Image(),rd=new FileReader();
    rd.onload=()=>{img.onload=()=>{
      const c=document.createElement("canvas");const s=Math.min(1,1000/Math.max(img.width,img.height));
      c.width=img.width*s;c.height=img.height*s;c.getContext("2d").drawImage(img,0,0,c.width,c.height);
      garFotos.push({data:c.toDataURL("image/jpeg",.72),w:c.width,h:c.height});
      $("g-fotos").innerHTML=garFotos.map((ff,i)=>fotoThumb(ff,i)).join("");};img.src=rd.result;};
    rd.readAsDataURL(f);});inp.value="";
}

async function agregarGuias(){
  const asesor=$("g-asesor").value;
  const fecha=$("g-fecha").value;
  const raw=$("g-numeros").value.trim();
  if(!raw){ toast("Escribe al menos un número de guía."); return; }
  if(!fecha){ toast("Selecciona la fecha de la guía."); return; }
  const nums=raw.split(/[\n,;\s]+/).map(s=>s.trim()).filter(Boolean);
  if(nums.length===0){ toast("No se detectaron números válidos."); return; }
  // fecha ISO con hora actual pero día seleccionado
  const fIso=new Date(fecha+"T"+new Date().toTimeString().slice(0,8)).toISOString();
  state.guias=state.guias||[];
  const existentes=new Set(state.guias.filter(g=>g.estado!=="ANULADA").map(g=>g.numero+"|"+g.asesor));
  let agregadas=0, repetidas=0;
  nums.forEach(n=>{
    if(existentes.has(n+"|"+asesor)){ repetidas++; return; }
    state.guias.push({id:"G"+Date.now()+"_"+Math.random().toString(36).slice(2,6),numero:n,asesor,fechaCreacion:fIso,estado:"ACTIVA",creadaPor:me.name});
    agregadas++;
  });
  await saveState();
  toast("✓ "+agregadas+" guía(s) agregada(s)"+(repetidas?" · "+repetidas+" ya existían":""));
  render();
}

function excelGuias(){
  if(!state.guias||state.guias.length===0){ toast("No hay guías para el reporte."); return; }
  const rows=state.guias.map(g=>{
    const usada=guiaUsadaEnTickets(g.id);
    const tks=state.tickets.filter(t=>t.estado!=="ELIMINADO"&&t.guiaId===g.id);
    let estado=g.estado==="ANULADA"?"ANULADA":(usada?"USADA":"NO USADA");
    return {
      "N° GUIA":g.numero,"ASESOR":g.asesor,"FECHA GUIA":fdate(g.fechaCreacion),
      "ESTADO":estado,
      "TICKETS QUE LA USARON":tks.map(t=>t.numero).join(", "),
      "FECHA(S) TICKET":tks.map(t=>fdate(t.fechaTicket)).join(", "),
      "MOTIVO ANULACION":g.estado==="ANULADA"&&g.anulacion?g.anulacion.motivo:"",
      "ANULADA POR":g.estado==="ANULADA"&&g.anulacion?g.anulacion.por:"",
      "CREADA POR":g.creadaPor||""
    };
  });
  const total=state.guias.length;
  const usadas=state.guias.filter(g=>g.estado!=="ANULADA"&&guiaUsadaEnTickets(g.id)).length;
  const anuladas=state.guias.filter(g=>g.estado==="ANULADA").length;
  const noUsadas=total-usadas-anuladas;
  rows.push({});
  rows.push({"N° GUIA":"RESUMEN"});
  rows.push({"N° GUIA":"Total pedidas","ASESOR":total});
  rows.push({"N° GUIA":"Usadas","ASESOR":usadas});
  rows.push({"N° GUIA":"No usadas","ASESOR":noUsadas});
  rows.push({"N° GUIA":"Anuladas","ASESOR":anuladas});
  const ws=XLSX.utils.json_to_sheet(rows),wb=XLSX.utils.book_new();
  ws["!cols"]=[{wch:18},{wch:24},{wch:14},{wch:12},{wch:24},{wch:24},{wch:24},{wch:18},{wch:18}];
  XLSX.utils.book_append_sheet(wb,ws,"Reporte Guías");
  XLSX.writeFile(wb,"Reporte_Guias_"+new Date().toISOString().slice(0,10)+".xlsx");
}
function itemsAceptados(t){
  if(t.motivo==="GARANTIAS") return t.items.filter(i=>llegoQ(i)>0).map(i=>{const q=llegoQ(i);const f=i.cantidad?q/i.cantidad:0;return {...i,cantNC:q,neto:i.neto*f,iva:i.iva*f,total:i.total*f};});
  return t.items.filter(i=>i.dev&&i.dev.acepta&&i.dev.cantAcep>0).map(i=>{const f=i.cantidad?i.dev.cantAcep/i.cantidad:0;return {...i,cantNC:i.dev.cantAcep,neto:i.neto*f,iva:i.iva*f,total:i.total*f};});
}

async function actualizarBaseFirebase(){

    tks=tks.filter(t=>{
      const f=hoyStr(t.fechaTicket);
      if(desde&&f<desde) return false;
      if(hasta&&f>hasta) return false;
      return true;
    });
  }
  if(tks.length===0){toast("No hay tickets en ese rango de fechas.");return;}
  const rows=tks.map(t=>({
    "N° TICKET":t.numero,"GUIA":t.guiaNumero||"","SOBRE":t.sobre?"SÍ":"NO","SOBRE LLEGÓ":t.sobre?(t.sobreLlego===true?"SÍ":t.sobreLlego===false?"NO":"PENDIENTE"):"",
    "FECHA CREACION":fdatetime(t.fechaTicket),"FACTURA":t.factura,"FACTURADOR":t.facturador||"",
    "EMISION":fdate(t.emision),"RAZON SOCIAL":t.razonSocial,"RUC":t.ruc||"","VENDEDOR":t.vendedor,"MOTIVO":t.motivo,
    "FECHA MERCADERIA":t.fechas?.mercaderia?fdatetime(t.fechas.mercaderia):"",
    "FECHA DEVOLUCION":t.fechas?.devolucion?fdatetime(t.fechas.devolucion):"",
    "FECHA GARANTIA":t.fechas?.garantia?fdatetime(t.fechas.garantia):"",
    "FECHA NC":t.fechas?.nc?fdatetime(t.fechas.nc):"",
    "N° NC":t.nc?.numero||"","ESTADO NC":t.nc?(t.nc.hecha?"HECHA":"PENDIENTE"):"",
    "ESTADO":ESTADO_LABEL[t.estado]||t.estado,
    "MOTIVO ELIMINACION":t.eliminacion?t.eliminacion.motivo:"",
    "GUIA INCORRECTA":t.guiaIncorrecta?t.guiaIncorrecta.motivo:"",
    "TOTAL TICKET":+t.items.reduce((s,i)=>s+i.total,0).toFixed(2),
    "TOTAL ACEPTADO":t.estado==="NC"||t.fechas?.nc?+totalAceptado(t).toFixed(2):""
  }));
  const ws=XLSX.utils.json_to_sheet(rows),wb=XLSX.utils.book_new();
  ws["!cols"]=Object.keys(rows[0]).map(k=>({wch:Math.max(13,k.length+2)}));
  XLSX.utils.book_append_sheet(wb,ws,"Consolidado");
  const suf=desde||hasta?("_"+(desde||"inicio")+"_a_"+(hasta||"hoy")):"";
  XLSX.writeFile(wb,"Reporte_Consolidado"+suf+".xlsx");
}
/* ---- Admin: administrar / anular guías ---- */
function adminVerGuias(){
  const guias=(state.guias||[]).slice().reverse();
  $("modal-root").innerHTML=`<div class="modal-bg"><div class="modal">
    <h2 style="font-size:24px;color:var(--navy);margin-bottom:10px">Administrar guías</h2>
    ${guias.length===0?'<div class="empty"><div class="big">Sin guías</div></div>':`
    <div style="overflow-x:auto"><table><thead><tr><th>N° Guía</th><th>Asesor</th><th>Fecha</th><th>Estado</th><th>Tickets</th><th></th></tr></thead><tbody>
    ${guias.map(g=>{
      const usada=guiaUsadaEnTickets(g.id);
      const tks=state.tickets.filter(t=>t.estado!=="ELIMINADO"&&t.guiaId===g.id);
      let estTag=g.estado==="ANULADA"?'<span class="tag tag-bad">Anulada</span>':(usada?'<span class="tag tag-nc">Usada</span>':'<span class="tag tag-merc">Activa</span>');
      return `<tr><td><b>${esc(g.numero)}</b></td><td>${esc(g.asesor)}</td><td>${fdate(g.fechaCreacion)}</td>
      <td>${estTag}</td><td>${tks.map(t=>esc(t.numero)).join(", ")||"—"}</td>
      <td>${g.estado!=="ANULADA"?`<button class="btn btn-bad btn-sm" onclick="abrirAnularGuia('${g.id}')">Anular</button>`:`<span class="muted">${esc(g.anulacion?.por||"")}</span>`}</td></tr>`;
    }).join("")}
    </tbody></table></div>`}
    <div style="text-align:right;margin-top:12px"><button class="btn btn-p" onclick="$('modal-root').innerHTML=''">Cerrar</button></div>
  </div></div>`;
}
function abrirAnularGuia(id){
  const g=findGuia(id);
  $("modal-root").innerHTML=`<div class="modal-bg"><div class="modal" style="max-width:480px">
    <h2 style="font-size:22px;color:var(--bad);margin-bottom:8px">Anular guía ${esc(g.numero)}</h2>
    <div class="muted" style="margin-bottom:14px">Asesor: ${esc(g.asesor)} · ${fdate(g.fechaCreacion)}<br>Una guía anulada ya no podrá usarse para crear tickets.</div>
    <div class="field"><label>Motivo de anulación</label><textarea id="anul-motivo" rows="3" placeholder="Ej.: guía duplicada, error de registro…"></textarea></div>
    <div style="display:flex;gap:10px;justify-content:flex-end">
      <button class="btn btn-g" onclick="adminVerGuias()">Cancelar</button>
      <button class="btn btn-bad" onclick="confirmarAnularGuia('${g.id}')">Anular guía</button>
    </div>
  </div></div>`;
}
async function confirmarAnularGuia(id){
  const motivo=$("anul-motivo").value.trim(); if(!motivo){ toast("Escribe el motivo."); return; }
  const g=findGuia(id);
  g.estado="ANULADA"; g.anulacion={por:me.name,f:new Date().toISOString(),motivo};
  await saveState(); toast("✓ Guía "+g.numero+" anulada."); adminVerGuias(); 
  if(me.role==="ADMIN") renderAdmin();
}
/* ---- Limpiar todos los tickets y guías (datos de prueba) ---- */
function abrirLimpiarTodo(){
  $("modal-root").innerHTML=`<div class="modal-bg"><div class="modal" style="max-width:520px">
    <h2 style="font-size:22px;color:var(--bad);margin-bottom:8px">⚠ Borrar todos los datos de prueba</h2>
    <div class="muted" style="margin-bottom:14px">
      Se borrarán <b>${state.tickets.length} ticket(s)</b> y <b>${(state.guias||[]).length} guía(s)</b>. Los contadores de tickets volverán a empezar en 3200-0001 y 5200-0001.<br><br>
      La base de facturas NO se toca. <b>Esta acción no se puede deshacer.</b><br><br>
      Para confirmar, escribe <b>BORRAR</b> en el recuadro:
    </div>
    <div class="field"><input id="conf-borrar" placeholder="Escribe BORRAR" autocomplete="off"></div>
    <div style="display:flex;gap:10px;justify-content:flex-end">
      <button class="btn btn-g" onclick="$('modal-root').innerHTML=''">Cancelar</button>
      <button class="btn btn-bad" onclick="ejecutarLimpiarTodo()">Borrar todo</button>
    </div>
  </div></div>`;
}
async function ejecutarLimpiarTodo(){
  if(($("conf-borrar").value||"").trim().toUpperCase()!=="BORRAR"){ toast("Escribe BORRAR para confirmar."); return; }
  state.tickets=[]; state.guias=[]; state.seq3200=0; state.seq5200=0;
  await saveState();
  // borrar también los PDFs de NC guardados
  try{ if(fbReady) await fbDB.ref("ncpdf").remove(); }catch(e){}
  $("modal-root").innerHTML=""; toast("✓ Datos de prueba borrados. El sistema está listo para usarse.");
  render();
}

/* ============================================================ INIT ============================================================ */
initLogin();
</script>
