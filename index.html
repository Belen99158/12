/* ===== CONFIG ===== */
var CSV_URLS=[

];

/* ===== USUARIOS ===== */

[["JOSUE PINEDA","1999"],["CARLOS HERRERA","2000"],["MOISES MOLINA","5003"],["SEBASTIAN VANEGAS","8001"],["DANIEL ESPAÑA","1552"],["FERNANDO MEZA","3225"],["PABLO PERALTA","4550"],["CRISTIAN SALAZAR","4888"],["CARLOS GRANJA","7810"],["CRISTINA CIFUENTES","8520"],["EDISON MAYORGA","6588"],["EDUARDO PICO","0458"],["STALIN COBA","2150"],["MABEL JACOME","0545"],["DIEGO ACHACHI","0254"],["CALL CENTER 1","8054"]].forEach(function(a){USERS.push({name:a[0],pass:a[1],role:"ASESOR"});});

var ROLE_LABEL={ASESOR:"Asesor comercial",MERCADERIA:"Revisión de mercadería",DEVOLUCION:"Revisión de devolución",GARANTIA:"Revisión de garantía",NC:"Notas de crédito",ADMIN:"Administrativo"};

var MOTIVOS=["DACION EN PAGOS","GESTION COMERCIAL CLIENTE VENDEDOR","LOGISTICA BODEGA","DEVOLUCION","GARANTIAS","INCIDENCIA GESTIONES ERRONEAS IMPORTACIONES"];
var MARCAS=["PERMATEX","ORIGINAL","VALEO","MAHLE","ABRO","LUBA AUTOPARTS","SEIWA","NPR","SABO","APLIC","JCC","MAGNETI MARELLI","AUTOTOP","OTRO"];
var ESTADO_LABEL={MERCADERIA:"En revisión mercadería",DEVOLUCION:"En revisión devolución",GARANTIA:"En revisión garantía",NC:"En notas de crédito",NO_LLEGO:"No llegó",DEV_RECHAZADA:"Devolución no aceptada",GAR_RECHAZADA:"Garantía no aceptada",GUIA_INCORRECTA:"Devuelto por guía incorrecta",ELIMINADO:"Eliminado"};
var MESES=["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
var SUCURSALES={"004":"AV. EL REY","002":"BODEGA","003":"AV. 6 DE DICIEMBRE","007":"AGENCIA LA PRENSA","006":"AGENCIA TUMBACO"};

var me=null, base=[], RAZONES=[];
var state={seq3200:0,seq5200:0,tickets:[],guias:[]};
var baseLoaded=false, baseLineas=0, baseFechaStr="";
var vistaActiva=null;
var nuevo=null, filtroItems="", filtroMisTickets="", filtroBandeja="", ncTab="pend", ncVista="tickets", guiaFiltroAsesor="", garFotos=[], ncPdfData=null, logoDataUrl=null, pdfUrl=null;

/* ===== FIREBASE ===== */
var fbApp=null, fbDB=null, fbReady=false, fbSuscrito=false;
function initFirebase(){
  try{
    if(typeof firebase==="undefined") throw new Error("SDK no cargó");
    fbApp=firebase.initializeApp(firebaseConfig);
    fbDB=firebase.database();
    fbReady=true;
    return true;
  }catch(e){ console.error(e); toast("⚠ No se pudo conectar a Firebase: "+(e&&e.message||e),6000); return false; }
}
function suscribirEstado(onPrimera){
  if(!fbReady){ if(onPrimera) onPrimera(); return; }
  var primera=true;
  fbDB.ref("estado").on("value",function(snap){
    var val=snap.val();
    if(val){
      state={seq3200:val.seq3200||0,seq5200:val.seq5200||0,tickets:arr(val.tickets),guias:arr(val.guias)};
    }else{
      state={seq3200:0,seq5200:0,tickets:[],guias:[]};
    }
    if(primera){ primera=false; if(onPrimera) onPrimera(); }
    else if(me){ render(); }
  },function(err){
    console.error(err); toast("⚠ Error Firebase: "+(err&&err.message||err),5000);
    if(primera){ primera=false; if(onPrimera) onPrimera(); }
  });
  fbSuscrito=true;
}
function arr(v){ if(Array.isArray(v)) return v; if(v&&typeof v==="object") return Object.keys(v).map(function(k){return v[k];}); return []; }
async function saveState(){
  if(!fbReady){ toast("⚠ Sin conexión. No se guardó."); return; }
  try{
    await fbDB.ref("estado").set({seq3200:state.seq3200||0,seq5200:state.seq5200||0,tickets:state.tickets||[],guias:state.guias||[],_updated:firebase.database.ServerValue.TIMESTAMP});
  }catch(e){ console.error(e); toast("⚠ Error guardando: "+(e&&e.message||e),6000); }
}
async function guardarPdfNC(id,obj){ if(!fbReady) throw new Error("Sin Firebase"); await fbDB.ref("ncpdf/"+id).set(obj); }
async function leerPdfNCfb(id){ if(!fbReady) throw new Error("Sin Firebase"); var s=await fbDB.ref("ncpdf/"+id).get(); return s.val(); }

/* ===== BASE EN FIREBASE ===== */
function comprimirBase(rows){
  var pool=[], map={};
  function idx(s){ s=String(s==null?"":s); if(map[s]!==undefined) return map[s]; var i=pool.length; pool.push(s); map[s]=i; return i; }
  var r=rows.map(function(x){ return [idx(x.emision),idx(x.factura),idx(x.ruc),idx(x.razon),idx(x.codigo),idx(x.desc),idx(x.sub),idx(x.facturador),x.cant,x.neto,x.iva,x.total]; });
  return {v:1,p:pool,r:r};
}
function descomprimirBase(o){
  if(!o||!o.r) return [];
  var p=o.p;
  return o.r.map(function(a){ return {emision:p[a[0]],factura:p[a[1]],ruc:p[a[2]],razon:p[a[3]],codigo:p[a[4]],desc:p[a[5]],sub:p[a[6]],facturador:p[a[7]],cant:a[8],neto:a[9],iva:a[10],total:a[11]}; });
}
var FB_CHUNK=200000;
async function subirBaseAFirebase(rows,onProg){
  if(!fbReady) throw new Error("Sin Firebase");
  var json=JSON.stringify(comprimirBase(rows));
  var chunks=[];
  for(var i=0;i<json.length;i+=FB_CHUNK){ chunks.push(json.slice(i,i+FB_CHUNK)); }
  if(onProg) onProg("Subiendo base ("+chunks.length+" bloques)…",70);
  await fbDB.ref("baseFacturas").remove();
  var meta={n:chunks.length,rows:rows.length,ts:new Date().toISOString()};
  for(var j=0;j<chunks.length;j++){
    if(onProg) onProg("Subiendo bloque "+(j+1)+"/"+chunks.length+"…",70+Math.round((j+1)/chunks.length*25));
    await fbDB.ref("baseFacturas/chunks/"+j).set(chunks[j]);
  }
  await fbDB.ref("baseFacturas/meta").set(meta);
  return meta;
}
async function leerBaseDeFirebase(onProg){
  if(!fbReady) return null;
  var ms=await fbDB.ref("baseFacturas/meta").get();
  var meta=ms.val();
  if(!meta||!meta.n) return null;
  if(onProg) onProg("Leyendo base desde Firebase…",20);
  var json="";
  for(var i=0;i<meta.n;i++){
    if(onProg) onProg("Bloque "+(i+1)+"/"+meta.n+"…",20+Math.round((i+1)/meta.n*50));
    var c=await fbDB.ref("baseFacturas/chunks/"+i).get();
    json+=c.val()||"";
  }
  return {rows:descomprimirBase(JSON.parse(json)),meta:meta};
}

/* ===== CARGA DE BASE ===== */
async function cargarBase(forzar,onProg){
  if(baseLoaded&&!forzar) return;
  try{
    if(onProg) onProg("Buscando base en Firebase…",10);
    var to=new Promise(function(res,rej){ setTimeout(function(){ rej(new Error("timeout")); },20000); });
    var r=await Promise.race([leerBaseDeFirebase(onProg),to]);
    if(r&&r.rows&&r.rows.length){
      base=r.rows; indexarBase(); baseLoaded=true; baseLineas=base.length; baseFechaStr="Firebase"; actualizarChipBase();
      if(onProg) onProg("Base lista: "+base.length.toLocaleString("es-EC")+" líneas (Firebase)",100);
      return;
    }
  }catch(e){ console.warn("Firebase base:",e&&e.message); }
  if(onProg) onProg("Cargando desde Google Sheets…",15);
  await cargarBaseDesdeSheets(true,onProg);
}
async function cargarBaseDesdeSheets(forzar,onProg){
  var csvText=null, ultimoError="";
  var cb="&_="+Date.now();
  function conBuster(u){ return u+(u.indexOf("?")>=0?cb:"?"+cb.slice(1)); }
  async function fetchTexto(m,url){
    var u=conBuster(url), opts={cache:"no-store"};
    if(m==="d"){ var r=await fetch(u,opts); if(!r.ok) throw new Error("HTTP "+r.status); return await r.text(); }
    if(m==="a"){ var r2=await fetch("https://api.allorigins.win/raw?url="+encodeURIComponent(u),opts); if(!r2.ok) throw new Error("HTTP "+r2.status); return await r2.text(); }
    if(m==="c"){ var r3=await fetch("https://corsproxy.io/?url="+encodeURIComponent(u),opts); if(!r3.ok) throw new Error("HTTP "+r3.status); return await r3.text(); }
    if(m==="g"){ var r4=await fetch("https://api.allorigins.win/get?url="+encodeURIComponent(u)+"&_="+Date.now(),opts); if(!r4.ok) throw new Error("HTTP "+r4.status); var j=await r4.json(); return j.contents; }
    if(m==="t"){ var r5=await fetch("https://api.codetabs.com/v1/proxy/?quest="+encodeURIComponent(u),opts); if(!r5.ok) throw new Error("HTTP "+r5.status); return await r5.text(); }
    return null;
  }
  var metodos=["d","a","c","g","t"], intento=0, total=CSV_URLS.length*5;
  for(var ui=0;ui<CSV_URLS.length;ui++){
    for(var mi=0;mi<metodos.length;mi++){
      intento++;
      try{
        if(onProg) onProg("Conectando ("+intento+"/"+total+")…",10+Math.round(intento/total*40));
        var txt=await fetchTexto(metodos[mi],CSV_URLS[ui]);
        if(txt&&txt.length>50&&txt.trim().toLowerCase().indexOf("<!doctype")!==0&&txt.trim().toLowerCase().indexOf("<html")!==0&&txt.indexOf(",")>=0){ csvText=txt; break; }
        ultimoError="Respuesta no válida";
      }catch(e){ ultimoError=(e&&e.message)||String(e); }
    }
    if(csvText) break;
  }
  if(!csvText) throw new Error("No se pudo descargar la base. "+ultimoError+".");
  if(onProg) onProg("Procesando filas…",60);
  base=parsearCSV(csvText); indexarBase(); baseLoaded=true; baseLineas=base.length; baseFechaStr="Google Sheets"; actualizarChipBase();

function parsearCSV(text){
  var rows=[], lines=text.split(/\r?\n/);
  if(lines.length<2) return [];
  var sep=lines[0].indexOf(";")>=0?";":",";
  function norm(k){ return String(k||"").trim().toUpperCase().replace(/\s+/g," "); }
  var headers=splitCSVLine(lines[0],sep).map(norm);
  function idx(h){ return headers.indexOf(h); }
  var iEmi=idx("EMISION"),iFact=idx("FACTURA"),iRuc=idx("IDENTIFICACION"),iRazon=idx("RAZON SOCIAL"),iCod=idx("CODIGO PRODUCTO"),iDesc=idx("DESCRIPCION PRODUCTO"),iSub=idx("SUBGRUPO"),iCant=idx("CANTIDAD"),iNeto=idx("PRECIO TOTAL NETO"),iIva=idx("IVA TOTAL"),iTot=idx("TOTAL PRODUCTO"),iF2=idx("FACTURADOR");
  for(var i=1;i<lines.length;i++){
    if(!lines[i].trim()) continue;
    var c=splitCSVLine(lines[i],sep);
    var fact=String(c[iFact]||"").trim(), razon=String(c[iRazon]||"").trim();
    if(!fact||!razon) continue;
    rows.push({emision:String(c[iEmi]||"").trim(),factura:fact,ruc:String(c[iRuc]||"").trim(),razon:razon,codigo:String(c[iCod]||"").trim(),desc:String(c[iDesc]||"").trim(),sub:String(c[iSub]||"").trim(),facturador:String(c[iF2]||"").trim(),cant:+(c[iCant]||0)||0,neto:+(c[iNeto]||0)||0,iva:+(c[iIva]||0)||0,total:+(c[iTot]||0)||0});
  }
  return rows;
}
function splitCSVLine(line,sep){
  sep=sep||",";
  var cols=[], cur="", inQ=false;
  for(var i=0;i<line.length;i++){
    var c=line[i];
    if(c==='"'){ if(inQ&&line[i+1]==='"'){ cur+='"'; i++; } else { inQ=!inQ; } }
    else if(c===sep&&!inQ){ cols.push(cur); cur=""; }
    else { cur+=c; }
  }
  cols.push(cur);
  return cols;
}
